onunciation:"sur-DEE lug ruh-HEE eh",german:{translation:"Es ist kalt / Mir ist kalt",pronunciation_guide:"sur-DEE lug ruh-HEE eh",contextual_note:"Punjab-Wintern: Nebelig aber mild."},turkish:{translation:"Uşudum / Hava soğuk",pronunciation_guide:"sur-DEE lug ruh-HEE eh",contextual_note:"Pencap kislari: sisli ama ılıman."},grammar_note:"'Sardi' = cold. 'Lag rahi' = is feeling (progressive). Dative construction: cold is 'happening to me'."},{id:"a2-w-004",order:4,punjabi:"Meeh pa reha e",punjabi_pronunciation:"meeh paa RAY-ha eh",german:{translation:"Es regnet",pronunciation_guide:"meeh paa RAY-ha eh",contextual_note:"'Meeh' = Regen. 'Pa reha' = giesst sich."},turkish:{translation:"Yağmur yagıyor",pronunciation_guide:"meeh paa RAY-ha eh",contextual_note:"'Meeh' = yagmur. 'Pa reha' = yagiyor."},grammar_note:"'Pa reha e' = is falling/pouring. Progressive aspect. Monsoon season is crucial for Punjab's agriculture."},{id:"a2-w-005",order:5,punjabi:"Badal chaa gaye",punjabi_pronunciation:"buh-DUL chaa guh-YAY",german:{translation:"Wolken haben sich gebildet",pronunciation_guide:"buh-DUL chaa guh-YAY",contextual_note:"Vor dem Regen."},turkish:{translation:"Bulutlar coktu",pronunciation_guide:"buh-DUL chaa guh-YAY",contextual_note:"Yagmurdan oence."},grammar_note:"'Badal' = clouds. 'Chaa gaye' = have covered (perfective). Like Turkish 'bulutlar coktu'."},{id:"a2-w-006",order:6,punjabi:"Hava chal rahi e",punjabi_pronunciation:"huh-VAA chul ruh-HEE eh",german:{translation:"Der Wind weht",pronunciation_guide:"huh-VAA chul ruh-HEE eh",contextual_note:"'Hava' = Wind. Auch: 'hava'."},turkish:{translation:"Ruzgar esiyor",pronunciation_guide:"huh-VAA chul ruh-HEE eh",contextual_note:"'Hava' = ruzgar. Ayrica: hava."},grammar_note:"'Hava' = wind/air. Same word as Turkish 'hava'! Shared Persian/Arabic root."},{id:"a2-w-007",order:7,punjabi:"Dhoop nikli e",punjabi_pronunciation:"dhoop nik-LEE eh",german:{translation:"Die Sonne scheint",pronunciation_guide:"dhoop nik-LEE eh",contextual_note:"Sonnenschein. 'Dhoop' = Sonne/Sonnenschein."},turkish:{translation:"Gunes acik",pronunciation_guide:"dhoop nik-LEE eh",contextual_note:"Gunes isigi. 'Dhoop' = guenes/guenes isigi."},grammar_note:"'Dhoop' = sunshine. 'Nikli' = has come out (feminine). Used when clouds clear."},{id:"a2-w-008",order:8,punjabi:"Sawan da mausam",punjabi_pronunciation:"suh-WUN daa MOW-sum",german:{translation:"Monsunzeit",pronunciation_guide:"suh-WUN daa MOW-sum",contextual_note:"Die Regenzeit (Juli-September)."},turkish:{translation:"Muson mevsimi",pronunciation_guide:"suh-WUN daa MOW-sum",contextual_note:"Yagmur mevsimi (Temmuz-Eyluel)."},grammar_note:"'Sawan' = monsoon/rainy season. Vital for Punjab's wheat and rice crops. Celebrated in folk songs."},{id:"a2-w-009",order:9,punjabi:"Kohra gherea e",punjabi_pronunciation:"koh-RAH gay-REE-aa eh",german:{translation:"Nebel hat sich gesetzt",pronunciation_guide:"koh-RAH gay-REE-aa eh",contextual_note:"Wintertypisch in Punjab."},turkish:{translation:"Sis bastirdi",pronunciation_guide:"koh-RAH gay-REE-aa eh",contextual_note:"Pencap kisina oezguer."},grammar_note:"'Kohra' = fog. Punjab winters are famous for thick fog. 'Gherna' = to surround/envelop."},{id:"a2-w-010",order:10,punjabi:"Vadia mausam e",punjabi_pronunciation:"vuh-DEE-aa MOW-sum eh",german:{translation:"Schoenes Wetter",pronunciation_guide:"vuh-DEE-aa MOW-sum eh",contextual_note:"Wetter loben."},turkish:{translation:"Guezel hava",pronunciation_guide:"vuh-DEE-aa MOW-sum eh",contextual_note:"Hava oegmek."},grammar_note:"Simple and useful. 'Vadia' = excellent/nice. Can describe anything positive."},{id:"a2-w-011",order:11,punjabi:"Barsaat aa gayi",punjabi_pronunciation:"bur-SAAT aa guh-YEE",german:{translation:"Der Regen ist gekommen",pronunciation_guide:"bur-SAAT aa guh-YEE",contextual_note:"Intensive Regenzeit."},turkish:{translation:"Yagmur basladi",pronunciation_guide:"bur-SAAT aa guh-YEE",contextual_note:"Intensif yagmur mevsimi."},grammar_note:"'Barsaat' = heavy rain (from Persian). Different from 'meeh' (regular rain)."},{id:"a2-w-012",order:12,punjabi:"Aasmaan saaf e",punjabi_pronunciation:"aa-SMAAN saaf eh",german:{translation:"Der Himmel ist klar",pronunciation_guide:"aa-SMAAN saaf eh",contextual_note:"Schoenes Wetter."},turkish:{translation:"Gok yuezue acik",pronunciation_guide:"aa-SMAAN saaf eh",contextual_note:"Guezel hava."},grammar_note:"'Aasmaan' = sky. 'Saaf' = clear/clean. From Persian/Arabic root (like Turkish 'saf')."}]},Uy={id:"a2-body",level:"A2",category:"body",sub_category:"Body & Health",title:"Body Parts & Health",description:"Essential anatomy and health vocabulary",icon:"Heart",total_phrases:14,xp_reward:75,phrases:[{id:"a2-b-001",order:1,punjabi:"Sir",punjabi_pronunciation:"seer",german:{translation:"Kopf",pronunciation_guide:"seer",contextual_note:"Auch: 'shir' in manchen Dialekten."},turkish:{translation:"Bas",pronunciation_guide:"seer",contextual_note:"Ayrica: bazi lehcclerde 'shir'."},grammar_note:"'Sir dard' = headache. 'Dard' = pain (from Persian, like Turkish 'dert')."},{id:"a2-b-002",order:2,punjabi:"Ankhan",punjabi_pronunciation:"un-KHAHN",german:{translation:"Augen",pronunciation_guide:"un-KHAHN",contextual_note:"Plural. Singular: 'Ankh'."},turkish:{translation:"Goezler",pronunciation_guide:"un-KHAHN",contextual_note:"Cogul. Tekil: 'Ankh'."},grammar_note:"'Ankhan' almost always used in plural. 'Meri ankhan' = my eyes."},{id:"a2-b-003",order:3,punjabi:"Naak",punjabi_pronunciation:"naak",german:{translation:"Nase",pronunciation_guide:"naak",contextual_note:"'Naak band hai' = verstopfte Nase."},turkish:{translation:"Burun",pronunciation_guide:"naak",contextual_note:"'Naak band hai' = tikali burun."},grammar_note:"'Naak' = nose. 'Band' = closed/blocked. Common during cold season."},{id:"a2-b-004",order:4,punjabi:"Kan",punjabi_pronunciation:"kaan",german:{translation:"Ohr",pronunciation_guide:"kaan",contextual_note:"'Kan vich dard' = Ohrenschmerzen."},turkish:{translation:"Kulak",pronunciation_guide:"kaan",contextual_note:"'Kan vich dard' = kulak agrisi."},grammar_note:"'Vich' = in (postposition). 'Kan vich' = in the ear. Like Turkish '-da/-de'."},{id:"a2-b-005",order:5,punjabi:"Dand",punjabi_pronunciation:"dund",german:{translation:"Zahn / Zaehne",pronunciation_guide:"dund",contextual_note:"'Dand dard' = Zahnschmerzen."},turkish:{translation:"Dis",pronunciation_guide:"dund",contextual_note:"'Dand dard' = dis agrisi."},grammar_note:"'Dand' = tooth/teeth. 'Dard' = pain. Punjabi often repeats the noun for pain description."},{id:"a2-b-006",order:6,punjabi:"Gal",punjabi_pronunciation:"gull",german:{translation:"Hals / Kehle",pronunciation_guide:"gull",contextual_note:"Auch: 'Sache'/'Thema' (wie 'gal' in anderen Phrasen)."},turkish:{translation:"Bogaz / Gur-lak",pronunciation_guide:"gull",contextual_note:"Ayrica: 'mesele'/'konu' (diger 'gal' ifadelerinde)."},grammar_note:"'Gal' has two meanings: throat AND matter/thing. Context determines meaning."},{id:"a2-b-007",order:7,punjabi:"Seena",punjabi_pronunciation:"SEE-nah",german:{translation:"Brust",pronunciation_guide:"SEE-nah",contextual_note:"Oberkoerper vorne."},turkish:{translation:"Goegs",pronunciation_guide:"SEE-nah",contextual_note:"Uest vucuet oen kismi."},grammar_note:"'Seena' = chest. 'Seena ch dard' = chest pain. 'Dil' (heart) is often used for emotions."},{id:"a2-b-008",order:8,punjabi:"Pet",punjabi_pronunciation:"pet",german:{translation:"Bauch / Magen",pronunciation_guide:"pet",contextual_note:"'Pet dard' = Bauchschmerzen."},turkish:{translation:"Karin / Mide",pronunciation_guide:"pet",contextual_note:"'Pet dard' = karin agrisi."},grammar_note:"'Pet' = stomach/belly. From Persian. Common complaint: 'Pet kharab e' = upset stomach."},{id:"a2-b-009",order:9,punjabi:"Haath",punjabi_pronunciation:"haat",german:{translation:"Hand / Haende",pronunciation_guide:"haat",contextual_note:"'Haath milao' = Haende schuetteln."},turkish:{translation:"El / Eller",pronunciation_guide:"haat",contextual_note:"'Haath milao' = el sikismak."},grammar_note:"'Haath' = hand. 'Haath milana' = to shake hands (meeting hands)."},{id:"a2-b-010",order:10,punjabi:"Pair",punjabi_pronunciation:"pair",german:{translation:"Fuss / Fuesse",pronunciation_guide:"pair",contextual_note:"'Pair dard' = Fussschmerzen."},turkish:{translation:"Ayak",pronunciation_guide:"pair",contextual_note:"'Pair dard' = ayak agrisi."},grammar_note:"'Pair' = foot/feet. 'Pair thak gaye' = feet got tired = Ayaklarim yoruldu."},{id:"a2-b-011",order:11,punjabi:"Bukhaar",punjabi_pronunciation:"boo-KHAAR",german:{translation:"Fieber",pronunciation_guide:"boo-KHAAR",contextual_note:"Haeufige Krankheit."},turkish:{translation:"Ateş",pronunciation_guide:"boo-KHAAR",contextual_note:"Yaygin hastalik."},grammar_note:"'Mujhe bukhaar e' = I have fever. Dative construction: fever 'is to me'."},{id:"a2-b-012",order:12,punjabi:"Khansi",punjabi_pronunciation:"khun-SEE",german:{translation:"Husten",pronunciation_guide:"khun-SEE",contextual_note:"'Khansi ho rahi e' = Ich habe Husten."},turkish:{translation:"Oekseurk",pronunciation_guide:"khun-SEE",contextual_note:"'Khansi ho rahi e' = oekseurueyorum."},grammar_note:"'Khansi' = cough. 'Ho rahi' = is happening (feminine progressive)."},{id:"a2-b-013",order:13,punjabi:"Dard",punjabi_pronunciation:"durd",german:{translation:"Schmerz",pronunciation_guide:"durd",contextual_note:"Universell. 'Dard' = Leid/Schmerz."},turkish:{translation:"Agri / Dert",pronunciation_guide:"durd",contextual_note:"Evrensel. 'Dard' = aci/dert."},grammar_note:"'Dard' = pain (from Persian). Very versatile. 'Dard hoya' = it hurt (past)."},{id:"a2-b-014",order:14,punjabi:"Tabiyat kharab e",punjabi_pronunciation:"tuh-bee-UT khuh-RAAB eh",german:{translation:"Ich fuehle mich nicht gut / Mir ist schlecht",pronunciation_guide:"tuh-bee-UT khuh-RAAB eh",contextual_note:"Allgemeine Krankheitsaeusserung."},turkish:{translation:"Kendimi iyi hissetmiyorum",pronunciation_guide:"tuh-bee-UT khuh-RAAB eh",contextual_note:"Genel hastalik ifadesi."},grammar_note:"'Tabiyat' = health/disposition. 'Kharab' = bad. 'Tabiyat theek nahi' = I'm not feeling well."}]},Oy={id:"a2-emotions",level:"A2",category:"emotions",sub_category:"Feelings & Emotions",title:"Emotions & Feelings",description:"Express how you feel in any situation",icon:"Smile",total_phrases:14,xp_reward:75,phrases:[{id:"a2-e-001",order:1,punjabi:"Main khush haan",punjabi_pronunciation:"mein khush haan",german:{translation:"Ich bin gluecklich",pronunciation_guide:"mein khush haan",contextual_note:"Grundgefuehl ausdruecken."},turkish:{translation:"Mutluyum",pronunciation_guide:"mein khush haan",contextual_note:"Temel duygu ifadesi."},grammar_note:"'Khush' = happy. From Persian. Universal in South Asian languages. SOV: Main (I) + khush (happy) + haan (am)."},{id:"a2-e-002",order:2,punjabi:"Main udaas haan",punjabi_pronunciation:"mein oo-DAS haan",german:{translation:"Ich bin traurig",pronunciation_guide:"mein oo-DAS haan",contextual_note:"'Udaas' aus dem Persischen."},turkish:{translation:"Ueguencteyim / Mutsuzum",pronunciation_guide:"mein oo-DAS haan",contextual_note:"'Udaas' Farsea kokenli."},grammar_note:"'Udaas' = sad. 'Udaasi' = sadness. Like Turkish 'ugun' from same Persian root."},{id:"a2-e-003",order:3,punjabi:"Gusse ch haan",punjabi_pronunciation:"GUS-seh ch haan",german:{translation:"Ich bin wuetend",pronunciation_guide:"GUS-seh ch haan",contextual_note:"'Gussa' = Wut. 'Ch' = in (Postposition)."},turkish:{translation:"Oekeliyim / Kızgınım",pronunciation_guide:"GUS-seh ch haan",contextual_note:"'Gussa' = oekeli. 'Ch' = -de/-da (edat)."},grammar_note:"Locative construction: 'ch' = in. 'Gusse ch' = in anger. Like Turkish 'oekeli/de'."},{id:"a2-e-004",order:4,punjabi:"Darr lag raha e",punjabi_pronunciation:"dur lug ruh-HAA eh",german:{translation:"Ich habe Angst",pronunciation_guide:"dur lug ruh-HAA eh",contextual_note:"'Darr' = Angst. 'Lag raha' = fuehle (maennlich)."},turkish:{translation:"Korkuyorum",pronunciation_guide:"dur lug ruh-HAA eh",contextual_note:"'Darr' = korku. 'Lag raha' = hissediyorum (eril)."},grammar_note:"Dative construction: Fear 'is happening to me'. 'Lag raha' = masc progressive."},{id:"a2-e-005",order:5,punjabi:"Thak gaya haan",punjabi_pronunciation:"thuk guh-YAA haan",german:{translation:"Ich bin muede",pronunciation_guide:"thuk guh-YAA haan",contextual_note:"Fuer Maenner. Frauen: 'Thak gayi haan'."},turkish:{translation:"Yoruldum",pronunciation_guide:"thuk guh-YAA haan",contextual_note:"Erkekler icin. Kadinlar: 'Thak gayi haan'."},grammar_note:"Perfective: 'gaya/gayi' = became (gendered). 'Thak' = tired + 'gaya' (masc) / 'gayi' (fem)."},{id:"a2-e-006",order:6,punjabi:"Hairaan haan",punjabi_pronunciation:"hai-RAAN haan",german:{translation:"Ich bin ueberrascht / verwirrt",pronunciation_guide:"hai-RAAN haan",contextual_note:"Ueberraschung oder Verwunderung."},turkish:{translation:"Sasirdim / Sasırtıcı",pronunciation_guide:"hai-RAAN haan",contextual_note:"Sasirma veya hayret."},grammar_note:"'Hairaan' = surprised/amazed. From Arabic root (like Turkish 'hayret')."},{id:"a2-e-007",order:7,punjabi:"Pyaar karda haan",punjabi_pronunciation:"pyaar kur-DAA haan",german:{translation:"Ich liebe / Ich habe lieb",pronunciation_guide:"pyaar kur-DAA haan",contextual_note:"Kann zu Familie, Freunden, Partnern gesagt werden."},turkish:{translation:"Seviyorum",pronunciation_guide:"pyaar kur-DAA haan",contextual_note:"Aileye, arkadaslara, ese soeylenebilir."},grammar_note:"'Pyaar' = love. 'Karna' = to do. 'Pyaar karna' = to love. Used for all types of love!"},{id:"a2-e-008",order:8,punjabi:"Bore ho raha haan",punjabi_pronunciation:"bor ho ruh-HAA haan",german:{translation:"Mir ist langweilig",pronunciation_guide:"bor ho ruh-HAA haan",contextual_note:"Englisches Lehnwort."},turkish:{translation:"Sikiliyorum",pronunciation_guide:"bor ho ruh-HAA haan",contextual_note:"Ingilizce odunc soezcuek."},grammar_note:"English loanword 'bore'. Progressive: 'ho raha' = is happening (to me)."},{id:"a2-e-009",order:9,punjabi:"Chinta na kar",punjabi_pronunciation:"CHIN-taa naa kur",german:{translation:"Mach dir keine Sorgen",pronunciation_guide:"CHIN-taa naa kur",contextual_note:"Troesten. 'Chinta' = Sorge (aus Sanskrit)."},turkish:{translation:"Endiselenme",pronunciation_guide:"CHIN-taa naa kur",contextual_note:"Teselli. 'Chinta' = endise (Sanskritce)."},grammar_note:"'Chinta' = worry (Sanskrit). 'Na kar' = don't do. Imperative negative."},{id:"a2-e-010",order:10,punjabi:"Sharminda haan",punjabi_pronunciation:"shur-MIN-daa haan",german:{translation:"Ich schaeme mich / Es tut mir leid",pronunciation_guide:"shur-MIN-daa haan",contextual_note:"Scham oder Entschuldigung."},turkish:{translation:"Utandim / Oezuer dilerim",pronunciation_guide:"shur-MIN-daa haan",contextual_note:"Utanc veya oezuer."},grammar_note:"'Sharminda' = ashamed/sorry. From Persian. Used for both embarrassment and apology."},{id:"a2-e-011",order:11,punjabi:"Naaraaz na ho",punjabi_pronunciation:"naa-RAAZ naa ho",german:{translation:"Sei nicht boese / Aerger dich nicht",pronunciation_guide:"naa-RAAZ naa ho",contextual_note:"Frieden stiften."},turkish:{translation:"Kusme / Kizma",pronunciation_guide:"naa-RAAZ naa ho",contextual_note:"Baris yapmak."},grammar_note:"'Naaraaz' = upset/angry. Common phrase after an argument or misunderstanding."},{id:"a2-e-012",order:12,punjabi:"Fikar na kar",punjabi_pronunciation:"fee-KUR naa kur",german:{translation:"Keine Sorge / Mach dir keine Gedanken",pronunciation_guide:"fee-KUR naa kur",contextual_note:"Beruhigend. 'Fikar' = Gedanke/Sorge."},turkish:{translation:"Merak etme / Tasalanma",pronunciation_guide:"fee-KUR naa kur",contextual_note:"Rahatlatmak. 'Fikar' = dert/endise."},grammar_note:"'Fikar' = thought/worry (Arabic). 'Na kar' = don't (do). Very common reassurance phrase."},{id:"a2-e-013",order:13,punjabi:"Maza aa gaya",punjabi_pronunciation:"muh-ZAA aa guh-YAA",german:{translation:"Es hat Spass gemacht!",pronunciation_guide:"muh-ZAA aa guh-YAA",contextual_note:"Freude ausdruecken. 'Maza' = Spass."},turkish:{translation:"Cok eglendim! / Keyifliydi!",pronunciation_guide:"muh-ZAA aa guh-YAA",contextual_note:"Sevinc ifade etmek. 'Maza' = zevk."},grammar_note:"'Maza aa gaya' = fun came = It was fun! Very common expression of enjoyment."},{id:"a2-e-014",order:14,punjabi:"Dil khush ho gaya",punjabi_pronunciation:"dil khush ho guh-YAA",german:{translation:"Das Herz ist gluecklich geworden / Ich bin geruehrt",pronunciation_guide:"dil khush ho guh-YAA",contextual_note:"Tiefe emotionale Befriedigung."},turkish:{translation:"Yueregim sevincle doldu / Cok mutlu oldum",pronunciation_guide:"dil khush ho guh-YAA",contextual_note:"Derin duygusal tatmin."},grammar_note:"'Dil' = heart. 'Khush ho gaya' = became happy. Emotional depth in Punjabi culture."}]},By={id:"b1-verbs",level:"B1",category:"verbs",sub_category:"Complex Verb Forms",title:"Complex Verbs & Tenses",description:"Master past, future, and conditional forms",icon:"Activity",total_phrases:14,xp_reward:100,phrases:[{id:"b1-v-001",order:1,punjabi:"Main gaya si",punjabi_pronunciation:"mein guh-YAA see",german:{translation:"Ich war gegangen / Ich ging (Vergangenheit)",pronunciation_guide:"mein guh-YAA see",contextual_note:"Vergangenheit. Fuer Maenner. Frauen: 'gayi si'."},turkish:{translation:"Gitmistim / Gittim",pronunciation_guide:"mein guh-YAA see",contextual_note:"Gecmis zaman. Erkekler icin. Kadinlar: 'gayi si'."},grammar_note:"Past tense: gaya (masc) / gayi (fem) + si (was). 'Main gaya si' = I had gone / I went."},{id:"b1-v-002",order:2,punjabi:"Oh aaya si",punjabi_pronunciation:"oh aa-YAA see",german:{translation:"Er/sie war gekommen",pronunciation_guide:"oh aa-YAA see",contextual_note:"Dritte Person Vergangenheit."},turkish:{translation:"O gelmisti",pronunciation_guide:"oh aa-YAA see",contextual_note:"Uecuencue sahis gecmis zaman."},grammar_note:"'Aaya' = came (masc). 'Si' = was. Past perfect: came + was = had come."},{id:"b1-v-003",order:3,punjabi:"Tussi ki kita?",punjabi_pronunciation:"too-SEE kee kee-TAA",german:{translation:"Was haben Sie gemacht?",pronunciation_guide:"too-SEE kee kee-TAA",contextual_note:"Vergangenheitsfrage."},turkish:{translation:"Ne yaptiniz?",pronunciation_guide:"too-SEE kee kee-TAA",contextual_note:"Gecmis zaman sorusu."},grammar_note:"'Kita' = did (masc past). 'Kitti' = did (fem past). Gender agrees with the action's implied object."},{id:"b1-v-004",order:4,punjabi:"Main jaavaanga",punjabi_pronunciation:"mein jaa-VAA-nga",german:{translation:"Ich werde gehen (Mann)",pronunciation_guide:"mein jaa-VAA-nga",contextual_note:"Zukunft. '-aanga' = maennliche Zukunft."},turkish:{translation:"Gidecegim (erkek)",pronunciation_guide:"mein jaa-VAA-nga",contextual_note:"Gelecek. '-aanga' = eril gelecek."},grammar_note:"Future tense: root + -aanga (masc) / -aangi (fem). 'Jaavaanga' = I will go (masc)."},{id:"b1-v-005",order:5,punjabi:"Oh aavegi",punjabi_pronunciation:"oh aa-VAY-gee",german:{translation:"Sie wird kommen (Frau)",pronunciation_guide:"oh aa-VAY-gee",contextual_note:"Zukunft weiblich."},turkish:{translation:"O gelecek (kadin)",pronunciation_guide:"oh aa-VAY-gee",contextual_note:"Gelecek disil."},grammar_note:"Future feminine: -egi. 'Aavegi' = she will come. Notice the 'v' sound insertion."},{id:"b1-v-006",order:6,punjabi:"Agar tussi aande...",punjabi_pronunciation:"UH-gur too-SEE aan-deh",german:{translation:"Wenn Sie kaemen...",pronunciation_guide:"uh-gur too-SEE aan-deh",contextual_note:"Konditional / Bedingung."},turkish:{translation:"Egelirseniz... / Gelseniz...",pronunciation_guide:"uh-gur too-SEE aan-deh",contextual_note:"Kosul / Sart."},grammar_note:"'Agar' = if (from Persian/Urdu). Conditional sentences: Agar... taan... (If... then...)."},{id:"b1-v-007",order:7,punjabi:"...taan vadia hovega",punjabi_pronunciation:"taan vuh-DEE-aa ho-VAY-ga",german:{translation:"...dann waere es schoen",pronunciation_guide:"taan vuh-DEE-aa ho-VAY-ga",contextual_note:"Konditionalergebnis."},turkish:{translation:"...o zaman guezel olur",pronunciation_guide:"taan vuh-DEE-aa ho-VAY-ga",contextual_note:"Kosul sonucu."},grammar_note:"'Taan' = then. 'Hovega' = would be (subjunctive future). Conditional perfect."},{id:"b1-v-008",order:8,punjabi:"Kar sakda haan",punjabi_pronunciation:"kur SUK-daa haan",german:{translation:"Ich kann machen (Mann)",pronunciation_guide:"kur SUK-daa haan",contextual_note:"Faehigkeit ausdruecken."},turkish:{translation:"Yapabilirim (erkek)",pronunciation_guide:"kur SUK-daa haan",contextual_note:"Yetenek belirtmek."},grammar_note:"'Sakna' = to be able. 'Kar sakda' = can do. Sakda (masc) / Sakdi (fem). Modal verb structure."},{id:"b1-v-009",order:9,punjabi:"Chahida si",punjabi_pronunciation:"chaa-HEE-daa see",german:{translation:"Es haette gemusst / Ich haette gebraucht",pronunciation_guide:"chaa-HEE-daa see",contextual_note:"Vergangene Notwendigkeit."},turkish:{translation:"Lazimdi / Ihtiyacim vardi",pronunciation_guide:"chaa-HEE-daa see",contextual_note:"Gecmis zorunluluk."},grammar_note:"'Chahida' = need + 'si' = past. 'Mujhe chahida si' = I needed (it). Dative construction."},{id:"b1-v-010",order:10,punjabi:"Ho sakda e",punjabi_pronunciation:"ho SUK-daa eh",german:{translation:"Es koennte sein / Vielleicht",pronunciation_guide:"ho SUK-daa eh",contextual_note:"Moeglichkeit ausdruecken."},turkish:{translation:"Olabilir / Belki",pronunciation_guide:"ho SUK-daa eh",contextual_note:"Olasilik belirtmek."},grammar_note:"'Ho sakda' = can be / might be. Very common for expressing possibility/uncertainty."},{id:"b1-v-011",order:11,punjabi:"Dasso ki hoya?",punjabi_pronunciation:"dus-SOH kee ho-YAA",german:{translation:"Erzaehlt, was passiert ist!",pronunciation_guide:"dus-SOH kee ho-YAA",contextual_note:"Nach einem Ereignis fragen."},turkish:{translation:"Anlatin ne oldu!",pronunciation_guide:"dus-SOH kee ho-YAA",contextual_note:"Bir olayi sormak."},grammar_note:"'Dasso' = tell (imperative plural/formal). 'Hoya' = happened (masc). Perfective past."},{id:"b1-v-012",order:12,punjabi:"Main jaanda si par...",punjabi_pronunciation:"mein joon-DAA see par",german:{translation:"Ich wuerde gehen, aber...",pronunciation_guide:"mein joon-DAA see par",contextual_note:"Kontrast / Widerspruch."},turkish:{translation:"Giderdim ama...",pronunciation_guide:"mein joon-DAA see par",contextual_note:"Karsitlik / Celiski."},grammar_note:"'Par' = but. Used for contrast. 'Si' + 'par' creates a conditional/would-have meaning."},{id:"b1-v-013",order:13,punjabi:"Vekehange",punjabi_pronunciation:"vay-KHAA-ngay",german:{translation:"Wir werden sehen",pronunciation_guide:"vay-KHAA-ngay",contextual_note:"Zukunft Plural."},turkish:{translation:"Goerecegiz",pronunciation_guide:"vay-KHAA-ngay",contextual_note:"Gelecek cogul."},grammar_note:"Plural future: -ange (instead of -aanga for singular). 'Vekehange' = we will see."},{id:"b1-v-014",order:14,punjabi:"Hun ki hovega?",punjabi_pronunciation:"hun kee ho-VAY-ga",german:{translation:"Was wird jetzt passieren?",pronunciation_guide:"hun kee ho-VAY-ga",contextual_note:"Zukunftssorge."},turkish:{translation:"Simdi ne olacak?",pronunciation_guide:"hun kee ho-VAY-ga",contextual_note:"Gelecek kaygisi."},grammar_note:"'Hovega' = will be (subjunctive/future). Used for uncertain future events."}]},Ly={id:"b1-travel",level:"B1",category:"travel",sub_category:"Travel & Transportation",title:"Travel & Tourism",description:"Navigate transportation and discuss travel plans",icon:"Plane",total_phrases:14,xp_reward:100,phrases:[{id:"b1-t-001",order:1,punjabi:"Ticket kitthe milegi?",punjabi_pronunciation:"TICK-it keet-THAY mil-LAY-gee",german:{translation:"Wo bekomme ich eine Karte?",pronunciation_guide:"TICK-it keet-THAY mil-LAY-gee",contextual_note:"Am Bahnhof/Flughafen."},turkish:{translation:"Bilet nereden alinir?",pronunciation_guide:"TICK-it keet-THAY mil-LAY-gee",contextual_note:"Tren istasyonu/havalimaninda."},grammar_note:"Future tense: 'milegi' = will be found (fem). 'Ticket' is feminine in Punjabi."},{id:"b1-t-002",order:2,punjabi:"Bus kadoon aaegi?",punjabi_pronunciation:"bus kuh-DOON aa-AY-gee",german:{translation:"Wann kommt der Bus?",pronunciation_guide:"bus kuh-DOON aa-AY-gee",contextual_note:"Warten an der Haltestelle."},turkish:{translation:"Otobues ne zaman gelecek?",pronunciation_guide:"bus kuh-DOON aa-AY-gee",contextual_note:"Durakta beklerken."},grammar_note:"'Kadoon' = when (variant of 'kadon'). 'Aaegi' = will come (fem, because bus is fem)."},{id:"b1-t-003",order:3,punjabi:"Station te utarna e",punjabi_pronunciation:"STAY-shun tay ut-UR-naa eh",german:{translation:"Ich muss am Bahnhof aussteigen",pronunciation_guide:"STAY-shun tay ut-UR-naa eh",contextual_note:"'Utarna' = aussteigen."},turkish:{translation:"Istasyonda inecegim",pronunciation_guide:"STAY-shun tay ut-UR-naa eh",contextual_note:"'Utarna' = inmek."},grammar_note:"'Utarna' = to get off. 'Te' = at (postposition). 'Station te' = at the station."},{id:"b1-t-004",order:4,punjabi:"Taxi karnee e",punjabi_pronunciation:"TUK-see kur-NEE eh",german:{translation:"Ich brauche ein Taxi",pronunciation_guide:"TUK-see kur-NEE eh",contextual_note:"'Karni' = weiblich, weil 'gaadi' impliziert."},turkish:{translation:"Taksi lazim",pronunciation_guide:"TUK-see kur-NEE eh",contextual_note:"'Karni' = disil, cunku 'gaadi' (araba) disil."},grammar_note:"'Karni' = feminine because 'gaadi' (vehicle) is feminine. Gender agreement!"},{id:"b1-t-005",order:5,punjabi:"Rasta dasso",punjabi_pronunciation:"rus-TAA dus-SOH",german:{translation:"Zeigen Sie den Weg!",pronunciation_guide:"rus-TAA dus-SOH",contextual_note:"Nach dem Weg fragen."},turkish:{translation:"Yolu goesterin!",pronunciation_guide:"rus-TAA dus-SOH",contextual_note:"Yoenu sormak."},grammar_note:"'Rasta' = way/road. 'Dasso' = show/tell (imperative formal). Essential for navigation!"},{id:"b1-t-006",order:6,punjabi:"Lahore kinne door e?",punjabi_pronunciation:"luh-HOR kee-NAY door eh",german:{translation:"Wie weit ist Lahore?",pronunciation_guide:"luh-HOR kee-NAY door eh",contextual_note:"Nach Entfernung fragen."},turkish:{translation:"Lahor ne kadar uzak?",pronunciation_guide:"luh-HOR kee-NAY door eh",contextual_note:"Mesafe sormak."},grammar_note:"'Kinne door' = how far. 'Door' = far (from Persian). Used for both distance and time."},{id:"b1-t-007",order:7,punjabi:"Hawai jahaaz",punjabi_pronunciation:"huh-WAA-ee juh-HAAZ",german:{translation:"Flugzeug",pronunciation_guide:"huh-WAA-ee juh-HAAZ",contextual_note:"'Hawai' = Luft. 'Jahaaz' = Schiff/Fahrzeug."},turkish:{translation:"Ucak",pronunciation_guide:"huh-WAA-ee juh-HAAZ",contextual_note:"'Hawai' = hava. 'Jahaaz' = gemi/arac."},grammar_note:"'Hawai jahaaz' = air ship = airplane. 'Hawai' = air (Persian). 'Jahaaz' = vessel."},{id:"b1-t-008",order:8,punjabi:"Rail gaddi",punjabi_pronunciation:"RAIL gud-DEE",german:{translation:"Zug / Eisenbahn",pronunciation_guide:"RAIL gud-DEE",contextual_note:"'Gaddi' = Fahrzeug."},turkish:{translation:"Tren",pronunciation_guide:"RAIL gud-DEE",contextual_note:"'Gaddi' = arac."},grammar_note:"'Rail gaddi' = rail vehicle = train. 'Gaddi' is feminine, so all related verbs are feminine."},{id:"b1-t-009",order:9,punjabi:"Bas te savaar hona",punjabi_pronunciation:"bus tay suh-VAAR ho-NAA",german:{translation:"In den Bus einsteigen",pronunciation_guide:"bus tay suh-VAAR ho-NAA",contextual_note:"'Savaar hona' = einsteigen."},turkish:{translation:"Otobuese binmek",pronunciation_guide:"bus tay suh-VAAR ho-NAA",contextual_note:"'Savaar hona' = binmek."},grammar_note:"'Savaar' = passenger/rider. 'Hona' = to become. 'Savaar hona' = to become a passenger = to board."},{id:"b1-t-010",order:10,punjabi:"Thaan kitthe e?",punjabi_pronunciation:"thaan keet-THAY eh",german:{translation:"Wo ist der Platz / Sitz?",pronunciation_guide:"thaan keet-THAY eh",contextual_note:"Sitzplatz suchen."},turkish:{translation:"Koltuk nerede?",pronunciation_guide:"thaan keet-THAY eh",contextual_note:"Koltuk aramak."},grammar_note:"'Thaan' = place/seat. Also means 'location' in general."},{id:"b1-t-011",order:11,punjabi:"Safar vadia raha",punjabi_pronunciation:"suh-FUR vuh-DEE-aa RUH-ha",german:{translation:"Die Reise war schoen",pronunciation_guide:"suh-FUR vuh-DEE-aa RUH-ha",contextual_note:"Nach der Reise."},turkish:{translation:"Yolculuk guezel gecti",pronunciation_guide:"suh-FUR vuh-DEE-aa RUH-ha",contextual_note:"Yolculuk sonrasi."},grammar_note:"'Safar' = journey (from Arabic). 'Raha' = remained/was. 'Safar vadia raha' = the journey was good."},{id:"b1-t-012",order:12,punjabi:"Kitthe rukna e?",punjabi_pronunciation:"keet-THAY ruk-NAA eh",german:{translation:"Wo muessen wir halten?",pronunciation_guide:"keet-THAY ruk-NAA eh",contextual_note:"Bus-/Taxifahrt."},turkish:{translation:"Nerede durmamiz lazim?",pronunciation_guide:"keet-THAY ruk-NAA eh",contextual_note:"Otobues/taksi yolculugunda."},grammar_note:"'Rukna' = to stop. Essential for telling drivers where to drop you off."},{id:"b1-t-013",order:13,punjabi:"Fauji hotel",punjabi_pronunciation:"fow-JEE ho-TEL",german:{translation:"Guenstiges Hotel / Herberge",pronunciation_guide:"fow-JEE ho-TEL",contextual_note:"Budget-Unterkunft."},turkish:{translation:"Ucuz otel / pansiyon",pronunciation_guide:"fow-JEE ho-TEL",contextual_note:"Ekonomik konaklama."},grammar_note:"'Fauji' = military. Fauji hotels are budget accommodations, often near bus/train stations."},{id:"b1-t-014",order:14,punjabi:"Videsh jaana",punjabi_pronunciation:"vee-DAYSH jaa-NAA",german:{translation:"Ins Ausland fahren",pronunciation_guide:"vee-DAYSH jaa-NAA",contextual_note:"'Videsh' = Ausland / fremdes Land."},turkish:{translation:"Yurtdisina cikmak",pronunciation_guide:"vee-DAYSH jaa-NAA",contextual_note:"'Videsh' = yurtdisi / yabanci ulke."},grammar_note:"'Videsh' = foreign country. Many Punjabis have family abroad ('videsh'). Diaspora connections."}]},Yy={id:"b1-business",level:"B1",category:"business",sub_category:"Work & Profession",title:"Business & Work",description:"Professional vocabulary and workplace communication",icon:"Briefcase",total_phrases:14,xp_reward:100,phrases:[{id:"b1-b-001",order:1,punjabi:"Office",punjabi_pronunciation:"OH-fis",german:{translation:"Buero",pronunciation_guide:"OH-fis",contextual_note:"Englisches Lehnwort."},turkish:{translation:"Ofis",pronunciation_guide:"OH-fis",contextual_note:"Ingilizce odunc soezcuek."},grammar_note:"English loanword. Common in urban business Punjabi. 'Daftar' is the traditional word."},{id:"b1-b-002",order:2,punjabi:"Meeting",punjabi_pronunciation:"MEE-ting",german:{translation:"Besprechung",pronunciation_guide:"MEE-ting",contextual_note:"Englisches Lehnwort."},turkish:{translation:"Toplanti",pronunciation_guide:"MEE-ting",contextual_note:"Ingilizce odunc soezcuek."},grammar_note:"English loanword. 'Bethak' is the traditional Punjabi word but rarely used in business."},{id:"b1-b-003",order:3,punjabi:"Daftar de kaam",punjabi_pronunciation:"DUF-tur day kaam",german:{translation:"Bueroarbeit",pronunciation_guide:"DUF-tur day kaam",contextual_note:"'Daftar' = traditionelles Wort fuer Buero."},turkish:{translation:"Ofis isi",pronunciation_guide:"DUF-tur day kaam",contextual_note:"'Daftar' = buero icin geleneksel kelime."},grammar_note:"'Daftar' = office (from Persian/Arabic). 'De' = of. 'Kaam' = work. Genitive construction."},{id:"b1-b-004",order:4,punjabi:"Naukri / Kam",punjabi_pronunciation:"NOW-kree / kaam",german:{translation:"Arbeit / Job",pronunciation_guide:"NOW-kree",contextual_note:"'Naukri' = bezahlte Arbeit. 'Kam' = allgemeine Arbeit."},turkish:{translation:"Is / Calisma",pronunciation_guide:"NOW-kree",contextual_note:"'Naukri' = uecretli is. 'Kam' = genel is."},grammar_note:"'Naukri' = employment (formal). 'Kam' = work (general). 'Naukri karna' = to work a job."},{id:"b1-b-005",order:5,punjabi:"Boss / Maalik",punjabi_pronunciation:"bos / MAA-lik",german:{translation:"Chef / Boss",pronunciation_guide:"bos",contextual_note:"'Maalik' = Eigentuemer/Chef (traditionell)."},turkish:{translation:"Patron / Boss",pronunciation_guide:"bos",contextual_note:"'Maalik' = sahip/patron (geleneksel)."},grammar_note:"English 'boss' is widely used. 'Maalik' has a more traditional/servile connotation."},{id:"b1-b-006",order:6,punjabi:"Tankhwa / Salary",punjabi_pronunciation:"tun-KHWAH",german:{translation:"Gehalt / Lohn",pronunciation_guide:"tun-KHWAH",contextual_note:"Monatliches Einkommen."},turkish:{translation:"Maas",pronunciation_guide:"tun-KHWAH",contextual_note:"Aylik gelir."},grammar_note:"'Tankhwa' = salary (Persian). English 'salary' is also used. Important topic in Punjabi culture!"},{id:"b1-b-007",order:7,punjabi:"Dukhaan",punjabi_pronunciation:"duh-KHAAN",german:{translation:"Laden / Geschaeft",pronunciation_guide:"duh-KHAAN",contextual_note:"Kleinunternehmen."},turkish:{translation:"Duekkan / Magaza",pronunciation_guide:"duh-KHAAN",contextual_note:"Kuecuek isletme."},grammar_note:"'Dukhaan' = shop (from Sanskrit). Punjabi entrepreneurial spirit: many own small shops."},{id:"b1-b-008",order:8,punjabi:"Sauda",punjabi_pronunciation:"SOW-daa",german:{translation:"Geschaeft / Handel",pronunciation_guide:"SOW-daa",contextual_note:"Handel allgemein."},turkish:{translation:"Ticaret / Is",pronunciation_guide:"SOW-daa",contextual_note:"Genel ticaret."},grammar_note:"'Sauda' = business deal/trade. 'Sauda karna' = to make a deal. Business-minded culture."},{id:"b1-b-009",order:9,punjabi:"Mulaazam",punjabi_pronunciation:"moo-LAA-zum",german:{translation:"Angestellter / Mitarbeiter",pronunciation_guide:"moo-LAA-zum",contextual_note:"Im Dienst stehend."},turkish:{translation:"Calisan / Personel",pronunciation_guide:"moo-LAA-zum",contextual_note:"Hizmetinde calisan."},grammar_note:"'Mulaazam' = employee (Arabic). Shows respect for workers - important in Punjabi business culture."},{id:"b1-b-010",order:10,punjabi:"Waada kar ke aaya",punjabi_pronunciation:"vaa-DAH kur kay aa-YAA",german:{translation:"Ich habe versprochen und bin gekommen",pronunciation_guide:"vaa-DAH kur kay aa-YAA",contextual_note:"Zuverlaessigkeit betonen."},turkish:{translation:"Soez verdim ve geldim",pronunciation_guide:"vaa-DAH kur kay aa-YAA",contextual_note:"Guvenilirlik vurgulamak."},grammar_note:"'Waada' = promise. Keeping one's word is a core Punjabi value. 'Waada' is sacred."},{id:"b1-b-011",order:11,punjabi:"Time par aao",punjabi_pronunciation:"TIME pur aa-OH",german:{translation:"Kommen Sie puenktlich!",pronunciation_guide:"TIME pur aa-OH",contextual_note:"Puenktlichkeit ist wichtig."},turkish:{translation:"Zamaninda gelin!",pronunciation_guide:"TIME pur aa-OH",contextual_note:"Dakiklik onemlidir."},grammar_note:"English 'time' + Punjabi 'par' (on). Code-mixing is common in urban business Punjabi."},{id:"b1-b-012",order:12,punjabi:"Kaam vadia kita",punjabi_pronunciation:"kaam vuh-DEE-aa kee-TAA",german:{translation:"Gute Arbeit geleistet",pronunciation_guide:"kaam vuh-DEE-aa kee-TAA",contextual_note:"Lob fuer gute Arbeit."},turkish:{translation:"Iyi is cikardiniz",pronunciation_guide:"kaam vuh-DEE-aa kee-TAA",contextual_note:"Iyi is oegmek."},grammar_note:"'Vadia' = good/excellent. 'Kita' = did (past masc). Praising work quality builds relationships."},{id:"b1-b-013",order:13,punjabi:"Chutti chahidi e",punjabi_pronunciation:"choot-TEE chaa-HEE-dee eh",german:{translation:"Ich brauche Urlaub / frei",pronunciation_guide:"choot-TEE chaa-HEE-dee eh",contextual_note:"Urlaubsantrag."},turkish:{translation:"Izin istiyorum / Ihtiyacim var",pronunciation_guide:"choot-TEE chaa-HEE-dee eh",contextual_note:"Izin talebi."},grammar_note:"'Chutti' = leave/holiday. From Sanskrit. Very important concept - everyone needs chutti!"},{id:"b1-b-014",order:14,punjabi:"Afsar",punjabi_pronunciation:"UF-sar",german:{translation:"Beamter / Offizier",pronunciation_guide:"UF-sar",contextual_note:"Respektvoller Titel."},turkish:{translation:"Memur / Amiri",pronunciation_guide:"UF-sar",contextual_note:"Saygili unvan."},grammar_note:"'Afsar' = officer (from Persian). Government jobs are highly prestigious in Punjabi society."}]},Gy={id:"b1-slang",level:"B1",category:"slang",sub_category:"Street Slang",title:"Slang & Colloquialisms",description:"Sound like a local with everyday Punjabi slang",icon:"Zap",total_phrases:14,xp_reward:100,phrases:[{id:"b1-sl-001",order:1,punjabi:"Jatta",punjabi_pronunciation:"JUT-tuh",german:{translation:"Mann / Bruder (Slang)",pronunciation_guide:"JUT-tuh",contextual_note:"Von 'Jatt' - Kriegerkaste. Freundliche Anrede."},turkish:{translation:"Adam / Kardes (argo)",pronunciation_guide:"JUT-tuh",contextual_note:"'Jatt' - savasci kastindan. Samimi hitap."},grammar_note:"'Jatta' is a cultural identity marker. Jatts are the dominant community in Punjab. Very commonly used among friends."},{id:"b1-sl-002",order:2,punjabi:"Balle balle!",punjabi_pronunciation:"BUL-lay BUL-lay",german:{translation:"Hurra! / Super!",pronunciation_guide:"BUL-lay BUL-lay",contextual_note:"Der Ausruf schlechthin! Freude und Begeisterung."},turkish:{translation:"Yasasin! / Harika!",pronunciation_guide:"BUL-lay BUL-lay",contextual_note:"En meshur nida! Sevinc ve heyecan."},grammar_note:"THE quintessential Punjabi exclamation! Used at weddings, parties, and any celebration. With Bhangra dance!"},{id:"b1-sl-003",order:3,punjabi:"Jhappi paa",punjabi_pronunciation:"JHUP-pee paa",german:{translation:"Gib eine Umarmung!",pronunciation_guide:"JHUP-pee paa",contextual_note:"'Jhappi' = Umarmung. Warm und herzlich."},turkish:{translation:"Saril! / Kucakla!",pronunciation_guide:"JHUP-pee paa",contextual_note:"'Jhappi' = kucaklama. Sicak ve samimi."},grammar_note:"Punjabis are very physically affectionate. Hugs ('jhappi') are standard greetings among friends."},{id:"b1-sl-004",order:4,punjabi:"Chak de phatte!",punjabi_pronunciation:"chuk DAY fut-TAY",german:{translation:"Auf geht's! / Gib Gas! / Du schaffst es!",pronunciation_guide:"chuk DAY fut-TAY",contextual_note:"Motivation. Urspruenglich vom Wrestling."},turkish:{translation:"Hadi bakalim! / Basarabilirsin!",pronunciation_guide:"chuk DAY fut-TAY",contextual_note:"Motivasyon. Oeruenue gueres ten."},grammar_note:"Famous motivational phrase! 'Chak de' = lift up. 'Phatte' = wooden planks (wrestling reference)."},{id:"b1-sl-005",order:5,punjabi:"Gabru",punjabi_pronunciation:"GUB-roo",german:{translation:"Junger Mann / Typ / Kerl",pronunciation_guide:"GUB-roo",contextual_note:"Jungen Maennern gegenueber."},turkish:{translation:"Genc adam / Herif",pronunciation_guide:"GUB-roo",contextual_note:"Genc erkeklere karsi."},grammar_note:"'Gabru' = young man. Often used in Bhangra lyrics. Celebrates youthful masculinity."},{id:"b1-sl-006",order:6,punjabi:"Mutiyaar",punjabi_pronunciation:"moo-tee-YAAR",german:{translation:"Junge Frau / Maedchen",pronunciation_guide:"moo-tee-YAAR",contextual_note:"Junger Frauen gegenueber."},turkish:{translation:"Genc kadin / Kiz",pronunciation_guide:"moo-tee-YAAR",contextual_note:"Genc kadinlara karsi."},grammar_note:"'Mutiyaar' = young woman. Often paired with 'Gabru' in songs and folk poetry."},{id:"b1-sl-007",order:7,punjabi:"Tera ki khayal e?",punjabi_pronunciation:"TAY-ra kee khu-YAAL eh",german:{translation:"Was denkst du? / Was ist deine Meinung?",pronunciation_guide:"TAY-ra kee khu-YAAL eh",contextual_note:"Nach Meinung fragen (informell)."},turkish:{translation:"Sen ne dusuenueyorsun?",pronunciation_guide:"TAY-ra kee khu-YAAL eh",contextual_note:"Fikir sormak (samimi)."},grammar_note:"'Khayal' = thought (Arabic). Very casual way to ask for an opinion."},{id:"b1-sl-008",order:8,punjabi:"Fokki gal nahi",punjabi_pronunciation:"FOH-kee gaal nuh-HEE",german:{translation:"Das ist keine leere Sache / Das ist ernst",pronunciation_guide:"FOH-kee gaal nuh-HEE",contextual_note:"Etwas Ernstes betonen."},turkish:{translation:"Bu bos bir sey degil / Bu ciddi",pronunciation_guide:"FOH-kee gaal nuh-HEE",contextual_note:"Ciddi bir seyi vurgulamak."},grammar_note:"'Fokki' = empty/weak. 'Gal nahi' = no small matter. This is serious stuff!"},{id:"b1-sl-009",order:9,punjabi:"Chal oye!",punjabi_pronunciation:"chul oy-YAY",german:{translation:"Komm schon! / Mach schon!",pronunciation_guide:"chul oy-YAY",contextual_note:"Auffordern (sehr informell)."},turkish:{translation:"Hadi canim! / Hadi ya!",pronunciation_guide:"chul oy-YAY",contextual_note:"Cagirmak (cok samimi)."},grammar_note:"'Oye' = hey (very informal). Only use with close friends! Can sound rude otherwise."},{id:"b1-sl-010",order:10,punjabi:"Tainu ki pata?",punjabi_pronunciation:"tuh-NOO kee PUH-taa",german:{translation:"Was weisst du? / Was geht dich das an?",pronunciation_guide:"tuh-NOO kee PUH-taa",contextual_note:"Manchmal herausfordernd."},turkish:{translation:"Sen ne bilirsin? / Sana ne?",pronunciation_guide:"tuh-NOO kee PUH-taa",contextual_note:"Bazen meydan okuyucu."},grammar_note:"Can be genuine ('What do you know?') or confrontational ('What do YOU know?'). Tone matters!"},{id:"b1-sl-011",order:11,punjabi:"Scene vadia e",punjabi_pronunciation:"SEEN vuh-DEE-aa eh",german:{translation:"Die Situation ist gut / Laeuft gut",pronunciation_guide:"SEEN vuh-DEE-aa eh",contextual_note:"Moderner Jugendslang."},turkish:{translation:"Durum iyi / Iyi gidiyor",pronunciation_guide:"SEEN vuh-DEE-aa eh",contextual_note:"Modern genclik argosu."},grammar_note:"English 'scene' mixed into Punjabi. Code-mixing is very common among urban youth."},{id:"b1-sl-012",order:12,punjabi:"Time pa gaya",punjabi_pronunciation:"TIME paa guh-YAA",german:{translation:"Es ist Zeit / Die Zeit ist um",pronunciation_guide:"TIME paa guh-YAA",contextual_note:"Zeitdruck ausdruecken."},turkish:{translation:"Zaman geldi / Zaman doldu",pronunciation_guide:"TIME paa guh-YAA",contextual_note:"Zaman baskisi ifade etmek."},grammar_note:"Code-mixing again: English 'time' + Punjabi 'pa gaya' (has fallen/become). Modern urban Punjabi."},{id:"b1-sl-013",order:13,punjabi:"Yaara da tashan",punjabi_pronunciation:"YAA-ra daa TUSH-un",german:{translation:"Der Stil der Freunde / Freunde machen den Stil",pronunciation_guide:"YAA-ra daa TUSH-un",contextual_note:"Freundschaft stolz ausdruecken."},turkish:{translation:"Arkadaslarin havasi / Stil",pronunciation_guide:"YAA-ra daa TUSH-un",contextual_note:"Dostluk gururunu ifade etmek."},grammar_note:"'Yaar' = friend (Persian). 'Tashan' = style/swag. Friendship is sacred in Punjabi culture."},{id:"b1-sl-014",order:14,punjabi:"Pinda di gall alag e",punjabi_pronunciation:"PIN-da dee gull uh-LAG eh",german:{translation:"Das Dorf ist anders / Dorfmentalitaet ist einzigartig",pronunciation_guide:"PIN-da dee gull uh-LAG eh",contextual_note:"Stolz auf laendliche Wurzeln."},turkish:{translation:"Koy farklidir / Koy mentalitesi emsalsizdir",pronunciation_guide:"PIN-da dee gull uh-LAG eh",contextual_note:"Koklere gurur duymak."},grammar_note:"'Pind' = village. Rural vs urban identity is a major theme in Punjabi culture and music."}]},Ky={id:"b2-formal",level:"B2",category:"formal",sub_category:"Formal & Professional",title:"Formal Speech & Register",description:"Master polite and professional Punjabi for formal situations",icon:"Crown",total_phrases:12,xp_reward:125,phrases:[{id:"b2-f-001",order:1,punjabi:"Tuhadi kirpa naal",punjabi_pronunciation:"too-HAA-dee KIR-paa naal",german:{translation:"Mit Ihrer freundlichen Erlaubnis / Dank Ihrer Guete",pronunciation_guide:"too-HAA-dee KIR-paa naal",contextual_note:"Sehr formell. Briefe/Reden."},turkish:{translation:"Sizin izininizle / Luetfen",pronunciation_guide:"too-HAA-dee KIR-paa naal",contextual_note:"Cok resmi. Mektuplar/konusmalar."},grammar_note:"'Kirpa' = grace/kindness. Highly respectful opening. Used in formal letters and speeches."},{id:"b2-f-002",order:2,punjabi:"Main tuhade saamne ek gall rakhna chahuna",punjabi_pronunciation:"mein too-HAA-day SAAM-nay ek gull rukh-NAA chaa-HOO-nah",german:{translation:"Ich moechte Ihnen etwas vorlegen",pronunciation_guide:"mein too-HAA-day SAAM-nay rukh-NAA chaa-HOO-nah",contextual_note:"Formelle Praesentation."},turkish:{translation:"Sizin oenuezue bir konu sunmak istiyorum",pronunciation_guide:"mein too-HAA-day SAAM-nay rukh-NAA chaa-HOO-nah",contextual_note:"Resmi sunum."},grammar_note:"'Saamne' = in front of. 'Rakhna' = to place/put. SOV: I + before you + a matter + place + want."},{id:"b2-f-003",order:3,punjabi:"Tuhadi meharbani hovegi",punjabi_pronunciation:"too-HAA-dee may-hur-BAA-nee ho-VAY-gee",german:{translation:"Es waere Ihr grosses Vergnuegen / Seien Sie so nett",pronunciation_guide:"too-HAA-dee may-hur-BAA-nee ho-VAY-gee",contextual_note:"Hoefliche Bitte, Dank."},turkish:{translation:"Sizin nezaketiniz olacak / Luetfen",pronunciation_guide:"too-HAA-dee may-hur-BAA-nee ho-VAY-gee",contextual_note:"Kibar rica, tesekkuer."},grammar_note:"'Meharbani' = kindness (Persian). Very respectful way to make a request or express gratitude."},{id:"b2-f-004",order:4,punjabi:"Ji, main samajh gaya haan",punjabi_pronunciation:"jee mein suh-MUJH guh-YAA haan",german:{translation:"Ja, ich habe verstanden",pronunciation_guide:"jee mein suh-MUJH guh-YAA haan",contextual_note:"Formelle Bestaetigung."},turkish:{translation:"Evet, anladim",pronunciation_guide:"jee mein suh-MUJH guh-YAA haan",contextual_note:"Resmi onay."},grammar_note:"'Ji' adds respect. 'Samajh gaya' = understood (perfective). Essential formal acknowledgment."},{id:"b2-f-005",order:5,punjabi:"Tuhade wastae shukriya",punjabi_pronunciation:"too-HAA-day vus-TAA shuh-KREE-ya",german:{translation:"Vielen Dank fuer Ihre Bemuehungen",pronunciation_guide:"too-HAA-day vus-TAA shuh-KREE-ya",contextual_note:"Wertschaetzung ausdruecken."},turkish:{translation:"Cabaalariniz icin tesekkuerler",pronunciation_guide:"too-HAA-day vus-TAA shuh-KREE-ya",contextual_note:"Takdir etmek."},grammar_note:"'Wastae' = for the sake of. Elevated, respectful way to say thank you for someone's efforts."},{id:"b2-f-006",order:6,punjabi:"Main sharminda haan",punjabi_pronunciation:"mein shur-MIN-daa haan",german:{translation:"Es tut mir sehr leid / Ich schaeme mich",pronunciation_guide:"mein shur-MIN-daa haan",contextual_note:"Formelle Entschuldigung."},turkish:{translation:"Cok oezuer dilerim / Utaniyorum",pronunciation_guide:"mein shur-MIN-daa haan",contextual_note:"Resmi oezuer."},grammar_note:"Deep apology. 'Sharminda' = ashamed. Shows genuine remorse in formal contexts."},{id:"b2-f-007",order:7,punjabi:"Tuhadi agya lei ke",punjabi_pronunciation:"too-HAA-dee ug-YAA LAI-kay",german:{translation:"Mit Ihrer Genehmigung / Wenn Sie erlauben",pronunciation_guide:"too-HAA-dee ug-YAA LAI-kay",contextual_note:"Um Erlaubnis bitten."},turkish:{translation:"Sizin izninizle / Muesaadenizle",pronunciation_guide:"too-HAA-dee ug-YAA LAI-kay",contextual_note:"Izin istemek."},grammar_note:"'Agya' = permission/command (Sanskrit). Very formal. Used when entering, leaving, or interrupting."},{id:"b2-f-008",order:8,punjabi:"Dil jo vada karange",punjabi_pronunciation:"dil jo vaa-DAH ku-RUN-gay",german:{translation:"Was wir von Herzen versprechen",pronunciation_guide:"dil jo vaa-DAH ku-RUN-gay",contextual_note:"Feierliche Versprechen."},turkish:{translation:"Yuerektenden soez verdiklerimiz",pronunciation_guide:"dil jo vaa-DAH ku-RUN-gay",contextual_note:"Torensel soez."},grammar_note:"Emotional commitment phrase. 'Dil' (heart) is central to Punjabi emotional expression."},{id:"b2-f-009",order:9,punjabi:"Sabh ton pehlan",punjabi_pronunciation:"subb ton pay-HUL-un",german:{translation:"Zuerst / Als erstes",pronunciation_guide:"subb ton pay-HUL-un",contextual_note:"Redeanfang."},turkish:{translation:"Oncelikle / Ilk oelarak",pronunciation_guide:"subb ton pay-HUL-un",contextual_note:"Konusma baslangici."},grammar_note:"'Sabh' = all. 'Ton' = from (ablative). 'Pehlan' = before. 'First of all' in formal speech."},{id:"b2-f-010",order:10,punjabi:"Ik vaari gall suno ji",punjabi_pronunciation:"ik VAA-ree gull soo-NOH jee",german:{translation:"Hoert mir bitte einmal zu",pronunciation_guide:"ik VAA-ree gull soo-NOH jee",contextual_note:"Aufmerksamkeit erbitten."},turkish:{translation:"Lueften bir kez dinleyin",pronunciation_guide:"ik VAA-ree gull soo-NOH jee",contextual_note:"Dikkat istemek."},grammar_note:"'Vaari' = time/turn. 'Suno' = listen (imperative). 'Ji' = respect. Polite attention-getter."},{id:"b2-f-011",order:11,punjabi:"Jis tarah tusi jaande ho...",punjabi_pronunciation:"jis tuh-RAH too-SEE joon-deh ho",german:{translation:"Wie Sie wissen... / Wie Ihnen bekannt ist...",pronunciation_guide:"jis tuh-RAH too-SEE joon-deh ho",contextual_note:"Formelle Einleitung."},turkish:{translation:"Bildiginiz gibi...",pronunciation_guide:"jis tuh-RAH too-SEE joon-deh ho",contextual_note:"Resmi giris."},grammar_note:"'Jis tarah' = in the way that. 'Jaande ho' = you know (habitual). Formal acknowledgment of shared knowledge."},{id:"b2-f-012",order:12,punjabi:"Saanu maan e",punjabi_pronunciation:"saa-NOO maan eh",german:{translation:"Wir sind stolz / Es ist uns eine Ehre",pronunciation_guide:"saa-NOO maan eh",contextual_note:"Stolz ausdruecken."},turkish:{translation:"Gururluyuz / Seref duyuyoruz",pronunciation_guide:"saa-NOO maan eh",contextual_note:"Gurur ifade etmek."},grammar_note:"'Maana' = honor/pride. Dative construction: 'To us (there is) honor'. Communal pride expression."}]},qy={id:"b2-proverbs",level:"B2",category:"proverbs",sub_category:"Punjabi Wisdom",title:"Proverbs & Sayings",description:"Traditional wisdom passed through generations",icon:"BookOpen",total_phrases:12,xp_reward:125,phrases:[{id:"b2-p-001",order:1,punjabi:"Jis da koi nahi, usda rab hai",punjabi_pronunciation:"jis daa koy nuh-HEE us-daa raab hai",german:{translation:"Wer niemanden hat, der hat Gott",pronunciation_guide:"jis daa koy nuh-HEE us-daa raab hai",contextual_note:"Trost in schwierigen Zeiten."},turkish:{translation:"Kimsesi olmayanin Tanrisi vardir",pronunciation_guide:"jis daa koy nuh-HEE us-daa raab hai",contextual_note:"Zor zamanlarda teselli."},grammar_note:"Deep spiritual wisdom: those who have no one have God. Reflects Sikh philosophy of divine protection."},{id:"b2-p-002",order:2,punjabi:"Badao bhad, khadao sohna",punjabi_pronunciation:"buh-DAA-o bhud khuh-DAA-o so-NAH",german:{translation:"Grosser Mann, grosses Herz",pronunciation_guide:"buh-DAA-o bhud khuh-DAA-o so-NAH",contextual_note:"Toleranz und Grosszuegigkeit."},turkish:{translation:"Bueyuek adam, buenuek yuerek",pronunciation_guide:"buh-DAA-o bhud khuh-DAA-o so-NAH",contextual_note:"Hosgoerue ve cengoercueluek."},grammar_note:"True greatness comes with kindness. Literally: 'A big man has a beautiful heart (when standing)'."},{id:"b2-p-003",order:3,punjabi:"Ghar di murghi daal barabar",punjabi_pronunciation:"ghar dee mur-GHEE daal buh-RUH-bur",german:{translation:"Eigenes ist nichts wert / Was man hat, schaetzt man nicht",pronunciation_guide:"ghar dee mur-GHEE daal buh-RUH-bur",contextual_note:"Wertschaetzung von dem, was man hat."},turkish:{translation:"Evin tavuğu mercimek kadar",pronunciation_guide:"ghar dee mur-GHEE daal buh-RUH-bur",contextual_note:"Sahip olunanin kiymetini bilmek."},grammar_note:"'Home chicken equals lentils' - we don't value what we have. Same sentiment as 'familiarity breeds contempt'."},{id:"b2-p-004",order:4,punjabi:"Jithon di kothri, uthon eh bhair",punjabi_pronunciation:"jee-THON dee koht-TREE oo-THON ay bhair",german:{translation:"Wo die Huette ist, da ist das Glueck",pronunciation_guide:"jee-THON dee koht-TREE oo-THON ay bhair",contextual_note:"Zuhause ist es am schoensten."},turkish:{translation:"Kulenin oldugu yerde mutluluk var",pronunciation_guide:"jee-THON dee koht-TREE oo-THON ay bhair",contextual_note:"Ev en guzel yerdir."},grammar_note:"Home is where happiness is. Emphasizes the central importance of home in Punjabi culture."},{id:"b2-p-005",order:5,punjabi:"Naachoonga na taane maar",punjabi_pronunciation:"naa-CHUN-gaa naa TAA-nay maan",german:{translation:"Entweder tanze oder hoer auf, mich zu stoeren",pronunciation_guide:"naa-CHUN-gaa naa TAA-nay maan",contextual_note:"Jemanden auffordern, mitzumachen."},turkish:{translation:"Ya oyna ya da rahatsiz etmeyi birak",pronunciation_guide:"naa-CHUN-gaa naa TAA-nay maan",contextual_note:"Birini katilmaya tesvik etmek."},grammar_note:"'Either dance or stop pushing me' - commit fully or step aside. No half-measures in Punjab!"},{id:"b2-p-006",order:6,punjabi:"Do nainaan de saah",punjabi_pronunciation:"doh nai-NAA-nay day saah",german:{translation:"Zwei Augen, ein Atemzug",pronunciation_guide:"doh nai-NAA-nay day saah",contextual_note:"Einheit und Zusammengehoerigkeit."},turkish:{translation:"Iki goez, bir nefes",pronunciation_guide:"doh nai-NAA-nay day saah",contextual_note:"Birlik ve beraberlik."},grammar_note:"Unity in two bodies. Describes soulmates, close siblings, or inseparable friends."},{id:"b2-p-007",order:7,punjabi:"Jithon lakh, uthon nakh",punjabi_pronunciation:"jee-THON lukh oo-THON nukh",german:{translation:"Wo Geld ist, da ist Stolz",pronunciation_guide:"jee-THON lukh oo-THON nukh",contextual_note:"Kritik an Geldstolz."},turkish:{translation:"Para olan yerde gurur vardir",pronunciation_guide:"jee-THON lukh oo-THON nukh",contextual_note:"Para gururunu elestirmek."},grammar_note:"'Where there's a lakh (100,000), there's pride.' Commentary on wealth and ego."},{id:"b2-p-008",order:8,punjabi:"Khaanda pinda tan jaanda",punjabi_pronunciation:"KHAAN-da PIN-da tun joon-DAH",german:{translation:"Wer isst, lebt",pronunciation_guide:"KHAAN-da PIN-da tun joon-DAH",contextual_note:"Einfachheit des Lebens."},turkish:{translation:"Yiyen yasar",pronunciation_guide:"KHAAN-da PIN-da tun joon-DAH",contextual_note:"Hayatin basitligi."},grammar_note:"'One who eats, village knows, then lives.' The simple pleasures of food and community sustain life."},{id:"b2-p-009",order:9,punjabi:"Bhaichara zindabaad",punjabi_pronunciation:"BHAICH-uh-raa zin-duh-BAAD",german:{translation:"Es lebe die Bruederlichkeit!",pronunciation_guide:"BHAICH-uh-raa zin-duh-BAAD",contextual_note:"Gemeinschaftsgeist feiern."},turkish:{translation:"Yasasin kardeslik!",pronunciation_guide:"BHAICH-uh-raa zin-duh-BAAD",contextual_note:"Topluluk ruhunu kutlamak."},grammar_note:"'Bhaichara' = brotherhood. Central to Punjabi identity. Equality and fraternity are core values."},{id:"b2-p-010",order:10,punjabi:"Pind ch lokaan di gall hor hundi e",punjabi_pronunciation:"pind ch loh-KAAN dee gull hor hun-DEE eh",german:{translation:"Im Dorf sprechen die Leute anders",pronunciation_guide:"pind ch loh-KAAN dee gull hor hun-DEE eh",contextual_note:"Lokale Unterschiede anerkennen."},turkish:{translation:"Koeyde insanlar farkli konusur",pronunciation_guide:"pind ch loh-KAAN dee gull or hun-DEE eh",contextual_note:"Yerel farkliliklari kabul etmek."},grammar_note:"Village vs city dialect differences. Acknowledging regional variations in speech."},{id:"b2-p-011",order:11,punjabi:"Rab rakha, pind vakhra",punjabi_pronunciation:"raab RAA-kha pind vukh-VRAA",german:{translation:"Gott behuete, jedes Dorf ist anders",pronunciation_guide:"raab RAA-kha pind vukh-VRAA",contextual_note:"Vielfalt feiern."},turkish:{translation:"Tanri korusun, her koy farklidir",pronunciation_guide:"raab RAA-kha pind vukh-VRAA",contextual_note:"Cesitliligi kutlamak."},grammar_note:"Every village is unique. Celebrates diversity within Punjabi culture. God's protection on all."},{id:"b2-p-012",order:12,punjabi:"Jehda kaam, ohda naam",punjabi_pronunciation:"JAYH-da kaam oh-daa naam",german:{translation:"Wie die Arbeit, so der Ruf",pronunciation_guide:"JEH-da kaam oh-daa naam",contextual_note:"Reputation durch Arbeit."},turkish:{translation:"Is nasilsa, uen de oyledir",pronunciation_guide:"JEH-da kaam oh-daa naam",contextual_note:"Is ile uen."},grammar_note:"Your name/reputation is determined by your work. Hard work defines character in Punjabi culture."}]},Vy={id:"c1-idioms",level:"C1",category:"proverbs",sub_category:"Advanced Idioms",title:"Advanced Idioms & Expressions",description:"Sophisticated expressions for fluent communication",icon:"BookOpen",total_phrases:12,xp_reward:150,phrases:[{id:"c1-i-001",order:1,punjabi:"Dil kare tae kitti kare",punjabi_pronunciation:"dil KUH-ray taa kit-TEE KUH-ray",german:{translation:"Was das Herz will, das tut es auch",pronunciation_guide:"dil KUH-ray taa kit-TEE KUH-ray",contextual_note:"Herz ueber Verstand."},turkish:{translation:"Yuerek ne isterse onu yapar",pronunciation_guide:"dil KUH-ray taa kit-TEE KUH-ray",contextual_note:"Yuerek aklin oenunde."},grammar_note:"Heart over mind. 'Dil' = heart in Punjabi, like 'yurek' in Turkish. Emotion-driven action."},{id:"c1-i-002",order:2,punjabi:"Sapp nun vekh ke lathi shadni nahi",punjabi_pronunciation:"sup noon vaykh kay LUT-tee shud-NEE nuh-HEE",german:{translation:"Man legt den Stock nicht weg, wenn man eine Schlange sieht",pronunciation_guide:"sup noon vaykh kay LUT-tee shud-NEE nuh-HEE",contextual_note:"Vorsicht ist geboten."},turkish:{translation:"Yılanı goeruence degnegi birakmazsin",pronunciation_guide:"sup noon vaykh kay LUT-tee shud-NEE nuh-HEE",contextual_note:"Dikkatli olmak gerekir."},grammar_note:"'Don't drop your stick when you see a snake' - stay prepared and vigilant."},{id:"c1-i-003",order:3,punjabi:"Jis da koyi nahi, ohda sab kujh hai",punjabi_pronunciation:"jis daa koy nuh-HEE oh-daa sub kujh hai",german:{translation:"Wer niemanden braucht, hat alles",pronunciation_guide:"jis daa koy nuh-HEE oh-daa sub kujh hai",contextual_note:"Selbstgenuegsamkeit."},turkish:{translation:"Kimsesi olmayanin her seyi vardir",pronunciation_guide:"jis daa koy nuh-HEE oh-daa sub kujh hai",contextual_note:"Kendine yeterlilik."},grammar_note:"Self-sufficiency is valued. One who needs no one has everything within."},{id:"c1-i-004",order:4,punjabi:"Pind di hawa te shahar di lugaai",punjabi_pronunciation:"pind dee huh-VAA tay shuh-HUR dee lug-AA-ee",german:{translation:"Dorfluft und Stadtleben",pronunciation_guide:"pind dee huh-VAA tay shuh-HUR dee lug-AA-ee",contextual_note:"Zwei Welten."},turkish:{translation:"Koy havasi ve sehir hayati",pronunciation_guide:"pind dee huh-VAA tay shuh-HUR dee lug-AA-ee",contextual_note:"Iki dunya."},grammar_note:"The contrast between village simplicity and city complexity. Common theme in Punjabi literature."},{id:"c1-i-005",order:5,punjabi:"Dil di gal, zubaan te nahi aundi",punjabi_pronunciation:"dil dee gull zu-BAAN tay nuh-HEE on-DEE",german:{translation:"Was das Herz fuehlt, kommt nicht auf die Zunge",pronunciation_guide:"dil dee gull zu-BAAN tay nuh-HEE on-DEE",contextual_note:"Unaussprechliche Gefuehle."},turkish:{translation:"Yueregin hissettigi dile gelmez",pronunciation_guide:"dil dee gull zu-BAAN tay nuh-HEE on-DEE",contextual_note:"Ifade edilemez duygular."},grammar_note:"Some feelings cannot be expressed in words. Deep emotional complexity."},{id:"c1-i-006",order:6,punjabi:"Raat gai baat gai",punjabi_pronunciation:"raat gai baat gai",german:{translation:"Die Nacht ist vorbei, die Geschichte ist vorbei",pronunciation_guide:"raat gai baat gai",contextual_note:"Vergessen und verzeihen."},turkish:{translation:"Gece gecti, hikaye gecti",pronunciation_guide:"raat gai baat gai",contextual_note:"Unutmak ve affetmek."},grammar_note:"Let bygones be bygones. The night has passed, so has the matter. Move on."},{id:"c1-i-007",order:7,punjabi:"Jinna janda e, uthe banda e",punjabi_pronunciation:"JIN-na jun-DAA ay oo-TAY bun-DAA ay",german:{translation:"So weit das Wasser fliesst, ist er ein Mensch",pronunciation_guide:"JIN-na jun-DAA ay oo-TAY bun-DAA ay",contextual_note:"Anpassungsfaehigkeit."},turkish:{translation:"Su nereye akarsa, insan orada yasar",pronunciation_guide:"JIN-na jun-DAA ay oo-TAY bun-DAA ay",contextual_note:"Uyum yetenegi."},grammar_note:"One adapts wherever they go. Water finds its level; humans find their place."},{id:"c1-i-008",order:8,punjabi:"Gallan di duniya, gallan hi gallan",punjabi_pronunciation:"gul-LAAN dee doo-NIYAA gul-LAN hee gul-LAN",german:{translation:"Die Welt ist aus Worten, nur Worte",pronunciation_guide:"gul-LAAN dee doo-NIYAA gul-LAN hee gul-LAN",contextual_note:"Worte sind wichtig."},turkish:{translatio contextual_note:"Poetischer Ausdruck."},turkish:{translation:"Yueregin yarasi",pronunciation_guide:"dil daa dur-DEE-ah",contextual_note:"Sairice ifade."},grammar_note:"'Dard' = pain. Heartache in poetic form. Central to ghazal and Punjabi folk song tradition."},{id:"c1-po-005",order:5,punjabi:"Sajna ve, thaari yaad aave",punjabi_pronunciation:"SUJ-naa vay thaa-REE yaa-DUH aa-VAY",german:{translation:"Geliebter, deine Erinnerung kommt",pronunciation_guide:"SUJ-naa vay thaa-REE yaa-DUH aa-VAY",contextual_note:"Folk-Song-Lyrik."},turkish:{translation:"Sevgilim, seni hatirliyorum",pronunciation_guide:"SUJ-naa vay thaa-REE yaa-DUH aa-VAY",contextual_note:"Halk sarkisi soezleri."},grammar_note:"Classic folk song opening. 'Sajna' = beloved. 'Thaari' = your (poetic form of 'teri')."},{id:"c1-po-006",order:6,punjabi:"Bullah ki jaana main kaun",punjabi_pronunciation:"bul-LAA kee jaa-NAA mein koon",german:{translation:"Bullah, ich weiss nicht, wer ich bin",pronunciation_guide:"bul-LAA kee jaa-NAA mein koon",contextual_note:"Bulleh Shah's beruehmtes Gedicht."},turkish:{translation:"Bullah, ben kim oldugumu bilmiyorum",pronunciation_guide:"bul-LAA kee jaa-NAA mein koon",contextual_note:"Bulleh Shah'in meshur siiri."},grammar_note:"Famous Sufi poem by Bulleh Shah (1680-1757). Ultimate spiritual inquiry into self-identity."},{id:"c1-po-007",order:7,punjabi:"Heer ranjha de pyaar di",punjabi_pronunciation:"heer RUN-jhaa day pyaa-ur dee",german:{translation:"Von der Liebe Heer und Ranjhas",pronunciation_guide:"heer RUN-jhaa day pyaa-ur dee",contextual_note:"Die beruehmteste Punjabi-Liebesgeschichte."},turkish:{translation:"Heer ve Ranjha askindan",pronunciation_guide:"heer RUN-jhaa day pyaa-ur dee",contextual_note:"En meshur Pencap ask hikayesi."},grammar_note:"Heer-Ranjha is the Punjabi Romeo and Juliet. Epic tragic love story by Waris Shah (1766)."},{id:"c1-po-008",order:8,punjabi:"Dhol vi maahiya",punjabi_pronunciation:"dhol vee MAA-hee-ya",german:{translation:"Trommel und mein Ge ssion."},{id:"c1-c-004",order:4,punjabi:"Boli te ma-boli da farak",punjabi_pronunciation:"bo-LEE tay muh-bo-LEE daa fuh-RUK",german:{translation:"Der Unterschied zwischen Sprache und Muttersprache",pronunciation_guide:"bo-LEE tay muh-bo-LEE daa fuh-RUK",contextual_note:"Sprachidentitaet."},turkish:{translation:"Dil ve ana dil arasindaki fark",pronunciation_guide:"bo-LEE tay muh-bo-LEE daa fuh-RUK",contextual_note:"Dil kimligi."},grammar_note:"'Boli' = spoken language. 'Ma-boli' = mother tongue. Identity distinction is culturally important."},{id:"c1-c-005",order:5,punjabi:"Jatt da muqabla",punjabi_pronunciation:"jut daa muk-QAA-bla",german:{translation:"Der Wettbewerb der Jatts",pronunciation_guide:"jut daa muk-QAA-bla",contextual_note:"Kulturelle Identitaet."},turkish:{translation:"Jattlarin rekabeti",pronunciation_guide:"jut daa muk-QAA-bla",contextual_note:"Kueltoerel kimlik."},grammar_note:"Jatt identity pride. Often referenced in music and pop culture. Complex social significance."},{id:"c1-c-006",order:6,punjabi:"Vaisakhi da tyohaar",punjabi_pronunciation:"vai-SUKH-ee daa tyoh-HAAR",german:{translation:"Das Vaisakhi-Fest",pronunciation_guide:"vai-SUKH-ee daa tyoh-HAAR",contextual_note:"Wichtigstes punjabisches Fest."},turkish:{translation:"Vaisakhi bayrami",pronunciation_guide:"vai-SUKH-ee daa tyoh-HAAR",contextual_note:"En onemli Pencap bayrami."},grammar_note:"Vaisakhi (April 13/14) = harvest festival + Sikh New Year + Khalsa founding (1699). Most important festival."},{id:"c1-c-007",order:7,punjabi:"Lohri di agg",punjabi_pronunciation:"loh-REE dee ug",german:{translation:"Das Feuer von Lohri",pronunciation_guide:"loh-REE dee ug",contextual_note:"Wintersonnenwende-Fest."},turkish:{translation:"Lohri atesi",pronunciation_guide:"loh-REE dee ug",contextual_note:"Kis guendoenumu bayrami."},grammar_note:"Lohri (Jan 13) = bonfire festival celebrating winter solstice and new harvest. Sesame seeds and jaggery are thrown in fire."},{id:"c1-c-008",order:8,punjabi:"Bha
