unjabi:"Sat Sri Akaal",punjabi_pronunciation:"sut sree uh-KAAL",german:{translation:"Hallo / Sei gegruesst (formell)",pronunciation_guide:"sut sree uh-KAAL",contextual_note:"Die universellste Begruessung im Punjabi. Wie 'Guten Tag' auf Deutsch."},turkish:{translation:"Merhaba / Selam (resmi)",pronunciation_guide:"sut sree uh-KAAL",contextual_note:"Punjabice'deki en evrensel selam. Tuem Punjab boelgesinde kullanilir."},grammar_note:"Standalone greeting like Turkish 'Merhaba'. Literally means 'Truth is the Ultimate God'."},{id:"a1-g-002",order:2,punjabi:"Ki haal e tuhada?",punjabi_pronunciation:"kee haal eh too-HAA-da",german:{translation:"Wie geht es Ihnen?",pronunciation_guide:"kee haal eh too-HAA-da",contextual_note:"Hoechst hoeffliche Form. Fuer Freunde: 'Ki haal e tera?' = 'Wie geht's?'"},turkish:{translation:"Nasılsınız?",pronunciation_guide:"kee haal eh too-HAA-da",contextual_note:"Saygili form. Arkadaslar arasinda 'Ki haal e tera?' = 'Nasılsın?'"},grammar_note:"SOV word order like Turkish! 'Ki' = What, 'haal' = condition, 'e' = is, 'tuhada' = your."},{id:"a1-g-003",order:3,punjabi:"Main theek haan",punjabi_pronunciation:"mein theek haan",german:{translation:"Mir geht es gut",pronunciation_guide:"mein theek haan",contextual_note:"Standardantwort. 'Theek' = richtig/okay, vielseitig wie 'gut'."},turkish:{translation:"İyiyim",pronunciation_guide:"mein theek haan",contextual_note:"Standart cevap. 'Theek' = iyi/dogru."},grammar_note:"Punjabi SOV: Main (I) + theek (good) + haan (am). Turkish: Ben + iyiyim. Both verb-final!"},{id:"a1-g-004",order:4,punjabi:"Tuhada naam ki e?",punjabi_pronunciation:"too-HAA-da naam kee eh",german:{translation:"Wie heissen Sie?",pronunciation_guide:"too-HAA-da naam kee eh",contextual_note:"Woertlich: 'Ihr Name was ist?' Wortreihenfolge wie im Tuerkischen!"},turkish:{translation:"Adınız ne?",pronunciation_guide:"too-HAA-da naam kee eh",contextual_note:"Tam anlami: 'Sizin adiniz ne?' Kelime sirasi Tuerkce ile ayni!"},grammar_note:"Perfect SOV: Tuhada naam (your name) + ki (what) + e (is) = Turkish: Adınız ne dir."},{id:"a1-g-005",order:5,punjabi:"Shukriya / Dhannvaad",punjabi_pronunciation:"shuh-KREE-ya / dhun-VAAD",german:{translation:"Danke / Vielen Dank",pronunciation_guide:"shuh-KREE-ya",contextual_note:"'Shukriya' aus Urdu, ueberall verbreitet. 'Dhannvaad' ist reines Punjabi."},turkish:{translation:"Teşekkür ederim / Sağ ol",pronunciation_guide:"shuh-KREE-ya",contextual_note:"'Shukriya' Urdu kokenli, butun Hint altkitasinda bilinir."},grammar_note:"Standalone expressions. 'Bohat shukriya' = 'Vielen Dank' = 'Cok tesekkur ederim'."},{id:"a1-g-006",order:6,punjabi:"Koi gal nahi",punjabi_pronunciation:"koy gaal nuh-HEE",german:{translation:"Kein Problem / Gern geschehen",pronunciation_guide:"koy gaal nuh-HEE",contextual_note:"Universelle Antwort auf Danke. Doppelnegation fuer Emphase."},turkish:{translation:"Rica ederim / Önemli değil",pronunciation_guide:"koy gaal nuh-HEE",contextual_note:"'Tesekkur ederim' cevabi olarak evrensel."},grammar_note:"Double negation: 'Koi' (any) + 'gal' (matter) + 'nahi' (not) = 'No matter not'."},{id:"a1-g-007",order:7,punjabi:"Mil ke khushi hoi",punjabi_pronunciation:"mil ke khuh-SHEE ho-EE",german:{translation:"Freut mich / Schoen Sie kennenzulernen",pronunciation_guide:"mil ke khuh-SHEE ho-EE",contextual_note:"Beim ersten Kennenlernen. Formeller: 'Tuhade naal mil ke khushi hoi'"},turkish:{translation:"Tanıştığımıza memnun oldum",pronunciation_guide:"mil ke khuh-SHEE ho-EE",contextual_note:"Ilk tanismada kullanilir. Daha resmi: 'Sizinle tanistigima memnun oldum'"},grammar_note:"SOV: Mil (meeting) + ke (with) + khushi (happiness) + hoi (was). Turkish: Tanistigimiza memnun oldum."},{id:"a1-g-008",order:8,punjabi:"Rab rakha / Khuda hafiz",punjabi_pronunciation:"raab RAA-kha / khu-DAA haa-FEEZ",german:{translation:"Auf Wiedersehen / Gott behuete dich",pronunciation_guide:"raab RAA-kha",contextual_note:"'Rab rakha' = Sikh/Hindu, 'Khuda hafiz' = Muslim. Beide respektvoll."},turkish:{translation:"Hoşça kal / Allahaısmarladık",pronunciation_guide:"raab RAA-kha",contextual_note:"'Rab rakha' Sikh/Hindu, 'Khuda hafiz' Muslim gelenekten. Her ikisi de saygili."},grammar_note:"Blessings as goodbyes. 'Rab' = God, 'rakha' = keep. Like Turkish 'Allahaısmarladık'."},{id:"a1-g-009",order:9,punjabi:"Good morning",punjabi_pronunciation:"gud MOR-ning",german:{translation:"Guten Morgen",pronunciation_guide:"gud MOR-ning",contextual_note:"Englischer Lehnwort, in Staedten ueblich. Traditionell: 'Sat Sri Akaal'"},turkish:{translation:"Günaydın",pronunciation_guide:"gud MOR-ning",contextual_note:"Ingilizce odunc soezcuek, sehirlerde yaygin. Geleneksel: 'Sat Sri Akaal'"},grammar_note:"English loanword commonly used in urban Punjab. Traditional greeting covers all times of day."},{id:"a1-g-010",order:10,punjabi:"Ji haan / Ji nahi",punjabi_pronunciation:"jee haan / jee nuh-HEE",german:{translation:"Ja bitte / Nein danke (hoefflich)",pronunciation_guide:"jee haan",contextual_note:"'Ji' ist das Honorifikum wie 'Sie' im Deutschen. Immer verwenden bei Aelteren."},turkish:{translation:"Evet efendim / Hayır efendim",pronunciation_guide:"jee haan",contextual_note:"'Ji' saygi eki. Buyuklerle konusurken her zaman kullanilir."},grammar_note:"'Ji' is the universal honorific suffix, attached to yes/no for politeness. Essential in Punjabi culture."},{id:"a1-g-011",order:11,punjabi:"Tusi kithe de ho?",punjabi_pronunciation:"too-SEE kee-theh deh ho",german:{translation:"Woher kommen Sie?",pronunciation_guide:"too-SEE kee-theh deh ho",contextual_note:"Wichtig in Punjab - Herkunft ist ein beliebtes Gespraechesthema."},turkish:{translation:"Nerelisiniz?",pronunciation_guide:"too-SEE kee-theh deh ho",contextual_note:"Punjab'da cok onemli - koken popueler bir konusma konusu."},grammar_note:"'Tusi' = you (formal/Siz), 'kithe' = where (nerede), 'de' = from (-li), 'ho' = are (siniz). SOV!"},{id:"a1-g-012",order:12,punjabi:"Main ___ de haan",punjabi_pronunciation:"mein ___ deh haan",german:{translation:"Ich komme aus ___",pronunciation_guide:"mein ___ deh haan",contextual_note:"Antwort auf 'Woher kommen Sie?' Fuelle das Land/die Stadt ein."},turkish:{translation:"Ben ___'liyim / ___'luyum",pronunciation_guide:"mein ___ deh haan",contextual_note:"'Nerelisiniz?' sorusunun cevabi. Uelke/sehir ismini ekleyin."},grammar_note:"'De' = from (-li/-lu in Turkish). Main Deutschland de haan = Ben Almanliyim."}],grammar_rules:[{id:"a1-gr-001",title:"Word Order (SOV)",explanation:"Punjabi follows Subject-Object-Verb order, like Turkish. German uses V2 (verb-second).",german_comparison:"German: Ich (S) gehe (V) nach Hause (O) - V2",turkish_comparison:"Turkish: Ben (S) eve (O) gidiyorum (V) - SOV",examples:[{punjabi:"Main school jaanda haan",german:"Ich gehe zur Schule",turkish:"Ben okula gidiyorum"}]},{id:"a1-gr-002",title:"Honorific 'Ji'",explanation:"'Ji' is added to names, greetings, and responses to show respect. Universal in Punjabi.",german_comparison:"Like using 'Sie' instead of 'du' in German",turkish_comparison:"Like using 'siz' instead of 'sen' in Turkish",examples:[{punjabi:"Sat Sri Akaal ji!",german:"Guten Tag! (sehr hoefflich)",turkish:"Merhaba! (cok resmi)"}]}]},jy={id:"a1-numbers",level:"A1",category:"numbers",sub_category:"Numbers 0-100",title:"Numbers & Counting",description:"Learn to count from zero to one hundred",icon:"Hash",total_phrases:20,xp_reward:50,phrases:[{id:"a1-n-001",order:1,punjabi:"Sifar",punjabi_pronunciation:"see-far",german:{translation:"Null",pronunciation_guide:"see-far",contextual_note:"Wie 'zero' auf Englisch."},turkish:{translation:"Sıfır",pronunciation_guide:"see-far",contextual_note:"'Sıfır' ile ayni koken!"},grammar_note:"Same root as Turkish 'sıfır' and Arabic 'sifr'. Many number words are shared across languages."},{id:"a1-n-002",order:2,punjabi:"Ik",punjabi_pronunciation:"ik",german:{translation:"Eins",pronunciation_guide:"ik",contextual_note:"Einschlaechtig. Wie 'ek' im Hindi."},turkish:{translation:"Bir",pronunciation_guide:"ik",contextual_note:"Basit ve yaygin."},grammar_note:"Used both as number and article ('a/an'). Ik banda = Ein Mann / Bir adam."},{id:"a1-n-003",order:3,punjabi:"Do",punjabi_pronunciation:"doh",german:{translation:"Zwei",pronunciation_guide:"doh",contextual_note:"Kurz und einfach."},turkish:{translation:"İki",pronunciation_guide:"doh",contextual_note:"Kisa ve basit."},grammar_note:"Related to Sanskrit 'dvi', like German 'zwei' and Turkish 'iki' (all Indo-European/Turkic roots)."},{id:"a1-n-004",order:4,punjabi:"Tinn",punjabi_pronunciation:"teen",german:{translation:"Drei",pronunciation_guide:"teen",contextual_note:"Wie 'teen' im Englischen (thir-teen)."},turkish:{translation:"Üç",pronunciation_guide:"teen",contextual_note:"Hint-Aryan kokenli."},grammar_note:"Tinn forms the basis for numbers 13-19 in some compound forms."},{id:"a1-n-005",order:5,punjabi:"Chaar",punjabi_pronunciation:"chaar",german:{translation:"Vier",pronunciation_guide:"chaar",contextual_note:"Wie 'char' im Hindi."},turkish:{translation:"Dört",pronunciation_guide:"chaar",contextual_note:"Hindistan'da cok yaygin."},grammar_note:"Chaar is also used in religious contexts (four vedas, four directions)."},{id:"a1-n-006",order:6,punjabi:"Panj",punjabi_pronunciation:"punj",german:{translation:"Fuenf",pronunciation_guide:"punj",contextual_note:"'Punjab' = Land der fuenf Fluesse!"},turkish:{translation:"Beş",pronunciation_guide:"punj",contextual_note:"'Punjab' = Bes nehir ulkesi!"},grammar_note:"'Panj' gives Punjab its name - 'Panj-aab' = five waters. Same root as Greek 'penta'."},{id:"a1-n-007",order:7,punjabi:"Che",punjabi_pronunciation:"chay",german:{translation:"Sechs",pronunciation_guide:"chay",contextual_note:"Weich ausgesprochen, fast wie 'che' in 'Chef'."},turkish:{translation:"Altı",pronunciation_guide:"chay",contextual_note:"Yumusak telaffuz."},grammar_note:"Che is a fundamental number used frequently in daily transactions."},{id:"a1-n-008",order:8,punjabi:"Satt",punjabi_pronunciation:"sut",german:{translation:"Sieben",pronunciation_guide:"sut",contextual_note:"Kurz und klar."},turkish:{translation:"Yedi",pronunciation_guide:"sut",contextual_note:"Kisa ve net."},grammar_note:"Satt appears in the days of the week (Sattvar = Saturday/Samstag)."},{id:"a1-n-009",order:9,punjabi:"Ath",punjabi_pronunciation:"uth",german:{translation:"Acht",pronunciation_guide:"uth",contextual_note:"Mit weichem 'th'."},turkish:{translation:"Sekiz",pronunciation_guide:"uth",contextual_note:"Yumusak 'th' ile."},grammar_note:"Ath is used in religious contexts (Ath daat = eight blessings)."},{id:"a1-n-010",order:10,punjabi:"Nau",punjabi_pronunciation:"now",german:{translation:"Neun",pronunciation_guide:"now",contextual_note:"Wie 'now' auf Englisch ausgesprochen."},turkish:{translation:"Dokuz",pronunciation_guide:"now",contextual_note:"Ingilizce 'now' gibi telaffuz."},grammar_note:"Nau is used in phrases like 'Nau nau' (9-9 = very different, like 'chalk and cheese')."},{id:"a1-n-011",order:11,punjabi:"Das",punjabi_pronunciation:"dus",german:{translation:"Zehn",pronunciation_guide:"dus",contextual_note:"Wie 'Dus' im Hindi. 'Das' in der Schrift."},turkish:{translation:"On",pronunciation_guide:"dus",contextual_note:"Hindi 'dus' ile ayni."},grammar_note:"Das forms the base for all tens (das-ik = 11, do-das = 20, etc.)."},{id:"a1-n-012",order:12,punjabi:"Gyaara",punjabi_pronunciation:"gyaa-ra",german:{translation:"Elf",pronunciation_guide:"gyaa-ra",contextual_note:"Unregelmaessig, wie 'eleven' im Englischen."},turkish:{translation:"On bir",pronunciation_guide:"gyaa-ra",contextual_note:"Duzensiz, Ingilizce 'eleven' gibi."},grammar_note:"11 and 12 are irregular in many languages - Punjabi, English, German all have unique forms."},{id:"a1-n-013",order:13,punjabi:"Baara",punjabi_pronunciation:"baa-ra",german:{translation:"Zwoelf",pronunciation_guide:"baa-ra",contextual_note:"Unregelmaessig."},turkish:{translation:"On iki",pronunciation_guide:"baa-ra",contextual_note:"Duzenli degil."},grammar_note:"Baara is also the word for 'dozen' - similar to English!"},{id:"a1-n-014",order:14,punjabi:"Ikaa",punjabi_pronunciation:"ee-KAA",german:{translation:"Einundzwanzig",pronunciation_guide:"ee-KAA",contextual_note:"Zwanzig + eins, aber umgekehrt wie im Deutschen!"},turkish:{translation:"Yirmi bir",pronunciation_guide:"ee-KAA",contextual_note:"Yirmi + bir."},grammar_note:"Punjabi reverses the compound: 'ika' (1) comes BEFORE the tens, unlike German 'ein-und-zwanzig'."},{id:"a1-n-015",order:15,punjabi:"Do daa / Vee",punjabi_pronunciation:"doh daa / vee",german:{translation:"Zwanzig",pronunciation_guide:"vee",contextual_note:"'Vee' ist die uebliche Form."},turkish:{translation:"Yirmi",pronunciation_guide:"vee",contextual_note:"'Vee' yaygin form."},grammar_note:"Vee (20) is the base for 21-29. Like Turkish 'yirmi' + 'bir' = yirmi bir."},{id:"a1-n-016",order:16,punjabi:"Tihai / Tih",punjabi_pronunciation:"tee-HAA / tee",german:{translation:"Dreissig",pronunciation_guide:"tee-HAA",contextual_note:"'Tih' ist die kurze Form."},turkish:{translation:"Otuz",pronunciation_guide:"tee-HAA",contextual_note:"'Tih' kisa form."},grammar_note:"Numbers 30+ follow regular pattern: tens + ones."},{id:"a1-n-017",order:17,punjabi:"Chali",punjabi_pronunciation:"chuh-LEE",german:{translation:"Vierzig",pronunciation_guide:"chuh-LEE",contextual_note:"'Chaar' (vier) + suffix."},turkish:{translation:"Kırk",pronunciation_guide:"chuh-LEE",contextual_note:"'Chaar' (dort) + eki."},grammar_note:"Chali (40) comes from Chaar (4) + suffix '-li', similar pattern to other tens."},{id:"a1-n-018",order:18,punjabi:"Punjaah",punjabi_pronunciation:"pun-JAA",german:{translation:"Fuenfzig",pronunciation_guide:"pun-JAA",contextual_note:"'Panj' (fuenf) + suffix."},turkish:{translation:"Elli",pronunciation_guide:"pun-JAA",contextual_note:"'Panj' (bes) + eki."},grammar_note:"Punjaah (50) - note the 'j' sound. Related to Panj (5)."},{id:"a1-n-019",order:19,punjabi:"Sattar",punjabi_pronunciation:"sut-TAR",german:{translation:"Siebzig",pronunciation_guide:"sut-TAR",contextual_note:"'Satt' (sieben) + suffix."},turkish:{translation:"Yetmiş",pronunciation_guide:"sut-TAR",contextual_note:"'Satt' (yedi) + eki."},grammar_note:"Sattar (70) - from Satt (7). Regular tens formation pattern."},{id:"a1-n-020",order:20,punjabi:"Sau",punjabi_pronunciation:"sow",german:{translation:"Hundert",pronunciation_guide:"sow",contextual_note:"Wie 'sow' (Saue) auf Englisch."},turkish:{translation:"Yüz",pronunciation_guide:"sow",contextual_note:"Ingilizce 'sow' gibi telaffuz."},grammar_note:"Sau (100) is the base for all hundreds. 'Do sau' = 200, 'Tinn sau' = 300, etc."}]},Ay={id:"a1-family",level:"A1",category:"family",sub_category:"Family Members",title:"Family & Relationships",description:"Essential family vocabulary",icon:"Users",total_phrases:15,xp_reward:50,phrases:[{id:"a1-f-001",order:1,punjabi:"Parivaar",punjabi_pronunciation:"puh-ree-VAR",german:{translation:"Familie",pronunciation_guide:"puh-ree-VAR",contextual_note:"Kernbegriff. Zentrale Rolle in der punjabischen Kultur."},turkish:{translation:"Aile",pronunciation_guide:"puh-ree-VAR",contextual_note:"Temel kavram. Pencap kultueruende merkezi rol."},grammar_note:"Family is central to Punjabi identity. The joint family system is still common in rural Punjab."},{id:"a1-f-002",order:2,punjabi:"Maa / Bebe",punjabi_pronunciation:"maa / BEH-beh",german:{translation:"Mutter / Mama",pronunciation_guide:"maa",contextual_note:"'Maa' ist universell. 'Bebe' ist die liebevolle Form."},turkish:{translation:"Anne / Ana",pronunciation_guide:"maa",contextual_note:"'Maa' evrensel. 'Bebe' sevgi dolu form."},grammar_note:"'Maa' shares the 'm' sound with mother/mutter/mere/mama across many languages - one of the most universal words."},{id:"a1-f-003",order:3,punjabi:"Pita / Pita ji / Bauji",punjabi_pronunciation:"pee-TAA / BOH-jee",german:{translation:"Vater / Papa",pronunciation_guide:"pee-TAA",contextual_note:"'Pita ji' = hoefflich. 'Bauji' = liebevoll/familiaer."},turkish:{translation:"Baba",pronunciation_guide:"pee-TAA",contextual_note:"'Pita ji' saygili. 'Bauji' samimi/sevgi dolu."},grammar_note:"'Pita' from Sanskrit. 'Bauji' is a warm, respectful term used especially in Pakistani Punjab."},{id:"a1-f-004",order:4,punjabi:"Putt / Beta",punjabi_pronunciation:"put / BAY-ta",german:{translation:"Sohn",pronunciation_guide:"put",contextual_note:"'Putt' = reines Punjabi. 'Beta' = aus dem Urdu/Hindi."},turkish:{translation:"Oğul / Evlat",pronunciation_guide:"put",contextual_note:"'Putt' saf Pencapca. 'Beta' Urdu/Hindi'den."},grammar_note:"Both words are used interchangeably. 'Beta' is more common in urban areas."},{id:"a1-f-005",order:5,punjabi:"Dhee / Beti",punjabi_pronunciation:"dhee / BAY-tee",german:{translation:"Tochter",pronunciation_guide:"dhee",contextual_note:"'Dhee' = traditionelles Punjabi. 'Beti' = modern."},turkish:{translation:"Kız evlat",pronunciation_guide:"dhee",contextual_note:"'Dhee' geleneksel Pencapca. 'Beti' modern."},grammar_note:"Dhee carries deep cultural significance - daughters are celebrated in Punjabi culture."},{id:"a1-f-006",order:6,punjabi:"Bhraa",punjabi_pronunciation:"bruhr-AA",german:{translation:"Bruder",pronunciation_guide:"bruhr-AA",contextual_note:"Aelterer oder juengerer Bruder."},turkish:{translation:"Erkek kardeş",pronunciation_guide:"bruhr-AA",contextual_note:"Buyuek veya kucuek erkek kardes."},grammar_note:"Punjabi distinguishes older/younger: 'Vadda bhraa' (big brother) vs 'Chotta bhraa' (little brother)."},{id:"a1-f-007",order:7,punjabi:"Bhen",punjabi_pronunciation:"bhen",german:{translation:"Schwester",pronunciation_guide:"bhen",contextual_note:"Aeltere oder juengere Schwester."},turkish:{translation:"Kız kardeş",pronunciation_guide:"bhen",contextual_note:"Buyuek veya kucuek kiz kardes."},grammar_note:"'Bhen ji' is used for respectful address, similar to 'Schwester' in formal German."},{id:"a1-f-008",order:8,punjabi:"Dada / Nana",punjabi_pronunciation:"duh-DAA / nuh-NAA",german:{translation:"Grossvater",pronunciation_guide:"duh-DAA",contextual_note:"'Dada' = vaeterlicherseits. 'Nana' = muetterlicherseits."},turkish:{translation:"Büyükbaba / Dede",pronunciation_guide:"duh-DAA",contextual_note:"'Dada' = baba tarafi. 'Nana' = anne tarafi."},grammar_note:"Punjabi, like Turkish, distinguishes maternal/paternal grandparents explicitly."},{id:"a1-f-009",order:9,punjabi:"Dadi / Nani",punjabi_pronunciation:"duh-DEE / nuh-NEE",german:{translation:"Grossmutter",pronunciation_guide:"duh-DEE",contextual_note:"'Dadi' = vaeterlicherseits. 'Nani' = mue­tterlicherseits."},turkish:{translation:"Büyük­anne / Nine",pronunciation_guide:"duh-DEE",contextual_note:"'Dadi' = baba tarafi. 'Nani' = anne tarafi."},grammar_note:"The distinction between paternal/maternal grandparents is culturally important."},{id:"a1-f-010",order:10,punjabi:"Pati / Khasam",punjabi_pronunciation:"puh-TEE / khuh-SUM",german:{translation:"Ehemann / Mann",pronunciation_guide:"puh-TEE",contextual_note:"'Khasam' = traditionell. 'Pati' = modern."},turkish:{translation:"Koca / Eş",pronunciation_guide:"puh-TEE",contextual_note:"'Khasam' = geleneksel. 'Pati' = modern."},grammar_note:"Traditional marriages are still common, though love marriages are increasing in cities."},{id:"a1-f-011",order:11,punjabi:"Patni / Zaalim",punjabi_pronunciation:"put-NEE / zaa-LEEM",german:{translation:"Ehefrau / Frau",pronunciation_guide:"put-NEE",contextual_note:"'Zaalim' = traditionell. 'Patni' = Sanskrit."},turkish:{translation:"Karı / Eş",pronunciation_guide:"put-NEE",contextual_note:"'Zaalim' = geleneksel. 'Patni' = Sanskrit."},grammar_note:"'Patni' comes from Sanskrit patni (wife of the lord/protector)."},{id:"a1-f-012",order:12,punjabi:"Mama / Maasi",punjabi_pronunciation:"muh-MAA / maa-SEE",german:{translation:"Onkel / Tante",pronunciation_guide:"muh-MAA",contextual_note:"'Mama' = Mamas Bruder. 'Maasi' = Mamas Schwester."},turkish:{translation:"Dayı / Teyze",pronunciation_guide:"muh-MAA",contextual_note:"'Mama' = annenin erkek kardesi. 'Maasi' = annenin kiz kardesi."},grammar_note:"Punjabi, like Turkish, has very specific kinship terms - Mama (maternal uncle) is distinct from Chacha (paternal uncle)."},{id:"a1-f-013",order:13,punjabi:"Chacha / Chachi",punjabi_pronunciation:"CHUH-cha / CHUH-chee",german:{translation:"Onkel / Tante (vaeterlicherseits)",pronunciation_guide:"CHUH-cha",contextual_note:"Vaters Bruder / Schwester."},turkish:{translation:"Amca / Hala",pronunciation_guide:"CHUH-cha",contextual_note:"Babanin erkek kardesi / kiz kardesi."},grammar_note:"Very specific kinship terminology distinguishes paternal/maternal relations clearly."},{id:"a1-f-014",order:14,punjabi:"Sautela bhai",punjabi_pronunciation:"sow-TAY-la bhai",german:{translation:"Stiefbruder / Halbbruder",pronunciation_guide:"sow-TAY-la bhai",contextual_note:"Aus einer anderen Ehe."},turkish:{translation:"Üvey erkek kardeş",pronunciation_guide:"sow-TAY-la bhai",contextual_note:"Baska bir evlilikten."},grammar_note:"Extended family terms are important due to the prevalence of joint families in rural Punjab."},{id:"a1-f-015",order:15,punjabi:"Mera parivaar bada e",punjabi_pronunciation:"may-ra puh-ree-VAR buh-DAA eh",german:{translation:"Meine Familie ist gross",pronunciation_guide:"may-ra puh-ree-VAR buh-DAA eh",contextual_note:"Gemeinsame Familien sind in Punjab ueblich."},turkish:{translation:"Benim ailem büyük",pronunciation_guide:"may-ra puh-ree-VAR buh-DAA eh",contextual_note:"Pencap'ta genis aileler yaygindir."},grammar_note:"SOV: Mera (my) + parivaar (family) + bada (big) + e (is). Turkish: Benim ailem buenuek."}]},Sy={id:"a1-food",level:"A1",category:"food",sub_category:"Common Foods",title:"Food & Dining",description:"Essential food vocabulary for everyday meals",icon:"UtensilsCrossed",total_phrases:15,xp_reward:50,phrases:[{id:"a1-fd-001",order:1,punjabi:"Roti",punjabi_pronunciation:"ro-TEE",german:{translation:"Brot / Fladenbrot",pronunciation_guide:"ro-TEE",contextual_note:"Das Grundnahrungsmittel jeder Mahlzeit."},turkish:{translation:"Ekmek / Lavaş",pronunciation_guide:"ro-TEE",contextual_note:"Her oeganin temel besin kaynagi."},grammar_note:"Roti is the staple of every Punjabi meal. No meal is complete without it."},{id:"a1-fd-002",order:2,punjabi:"Daal",punjabi_pronunciation:"daal",german:{translation:"Linsen / Linsensuppe",pronunciation_guide:"daal",contextual_note:"Taeegliches Gericht. Sehr proteinreich."},turkish:{translation:"Mercimek / Mercimek yemeği",pronunciation_guide:"daal",contextual_note:"Guenluek yemek. Cok proteinli."},grammar_note:"'Daal roti' is the classic Punjabi meal combination, like 'Brot und Butter'."},{id:"a1-fd-003",order:3,punjabi:"Chawal",punjabi_pronunciation:"chuh-WAAL",german:{translation:"Reis",pronunciation_guide:"chuh-WAAL",contextual_note:"'Chawal' = gekochter Reis."},turkish:{translation:"Pirinç / Pilav",pronunciation_guide:"chuh-WAAL",contextual_note:"'Chawal' = pisirilmis pirinc."},grammar_note:"Rice is commonly eaten with curry. 'Daal chawal' = lentils and rice, a complete protein meal."},{id:"a1-fd-004",order:4,punjabi:"Sabzi",punjabi_pronunciation:"sub-ZEE",german:{translation:"Gemuuese / Gemuesegericht",pronunciation_guide:"sub-ZEE",contextual_note:"Jedes gekochte Gemuuese."},turkish:{translation:"Sebze yemeği",pronunciation_guide:"sub-ZEE",contextual_note:"Herhangi bir pisirilmis sebze yemegi."},grammar_note:"Sabzi is a generic term for any vegetable curry. Usually eaten with roti."},{id:"a1-fd-005",order:5,punjabi:"Pani",punjabi_pronunciation:"puh-NEE",german:{translation:"Wasser",pronunciation_guide:"puh-NEE",contextual_note:"Basisvokabel. Auch fuer 'Getraenk' allgemein."},turkish:{translation:"Su",pronunciation_guide:"puh-NEE",contextual_note:"Temel kelime. Genel olarak 'icecek' icin de."},grammar_note:"'Pani chahida e?' = Do you want water? = Wasser bitte? = Su ister misiniz?"},{id:"a1-fd-006",order:6,punjabi:"Doodh",punjabi_pronunciation:"doodh",german:{translation:"Milch",pronunciation_guide:"doodh",contextual_note:"Sehr wichtig in Punjab. 'Punjab = Land der Milch und Honig'."},turkish:{translation:"Süt",pronunciation_guide:"doodh",contextual_note:"Pencap'ta cok onemli. 'Pencap = sut ve bal ulkesi'."},grammar_note:"Punjab is historically known for dairy production. Lassi (yogurt drink) is a famous Punjabi beverage."},{id:"a1-fd-007",order:7,punjabi:"Gosht",punjabi_pronunciation:"gosh-T",german:{translation:"Fleisch",pronunciation_guide:"gosh-T",contextual_note:"Alle Fleischsorten. 'Murgh' = Huhn, 'Gai' = Rind."},turkish:{translation:"Et",pronunciation_guide:"gosh-T",contextual_note:"Her tuerlue et. 'Murgh' = tavuk."},grammar_note:"Religious dietary restrictions vary: many Sikhs and Hindus are vegetarian; Muslims eat halal meat."},{id:"a1-fd-008",order:8,punjabi:"Anda",punjabi_pronunciation:"un-DAA",german:{translation:"Ei",pronunciation_guide:"un-DAA",contextual_note:"Ein beliebtes Fruehstueck in Punjab."},turkish:{translation:"Yumurta",pronunciation_guide:"un-DAA",contextual_note:"Pencap'ta popueler bir kahvalti."},grammar_note:"Eggs are commonly eaten for breakfast as 'anda bhurji' (scrambled eggs)."},{id:"a1-fd-009",order:9,punjabi:"Chai",punjabi_pronunciation:"chaai",german:{translation:"Tee",pronunciation_guide:"chaai",contextual_note:"Die Nationalgetraenk des Subkontinents!"},turkish:{translation:"Çay",pronunciation_guide:"chaai",contextual_note:"Alt kitanin milli icecegi!"},grammar_note:"'Chai' is the same word across Hindi, Urdu, Punjabi, Turkish, Russian, Arabic! Universal word."},{id:"a1-fd-010",order:10,punjabi:"Mein bhookha haan",punjabi_pronunciation:"mein BOO-kha haan",german:{translation:"Ich habe Hunger",pronunciation_guide:"mein BOO-kha haan",contextual_note:"Fuer Maenner. Frauen sagen: 'Mein bhookhi haan'"},turkish:{translation:"Açım",pronunciation_guide:"mein BOO-kha haan",contextual_note:"Erkekler icin. Kadinlar: 'Mein bhookhi haan'"},grammar_note:"Adjectives change by gender: -a (masculine) / -i (feminine). Like German der/die or Turkish -ım/-im."},{id:"a1-fd-011",order:11,punjabi:"Mein pyaasa haan",punjabi_pronunciation:"mein pyaa-SAA haan",german:{translation:"Ich habe Durst",pronunciation_guide:"mein pyaa-SAA haan",contextual_note:"Fuer Maenner. Frauen: 'Mein pyaasi haan'"},turkish:{translation:"Susadım / Susadım",pronunciation_guide:"mein pyaa-SAA haan",contextual_note:"Erkekler icin. Kadinlar: 'Mein pyaasi haan'"},grammar_note:"Pyaas = thirst. 'Pyaasa' (masc) / 'Pyaasi' (fem). Gender agreement is crucial in Punjabi."},{id:"a1-fd-012",order:12,punjabi:"Swad / Maza",punjabi_pronunciation:"swaad / maa-ZAA",german:{translation:"Lecker / Geschmack",pronunciation_guide:"swaad",contextual_note:"'Bahut swad e!' = 'Sehr lecker!'"},turkish:{translation:"Lezzetli / Güzel",pronunciation_guide:"swaad",contextual_note:"'Bahut swad e!' = 'Cok lezzetli!'"},grammar_note:"Food appreciation is a key social skill in Punjab. Always compliment the cook!"},{id:"a1-fd-013",order:13,punjabi:"Miththa",punjabi_pronunciation:"mit-THAA",german:{translation:"Süss",pronunciation_guide:"mit-THAA",contextual_note:"Geschmacksrichtung."},turkish:{translation:"Tatlı (tadi)",pronunciation_guide:"mit-THAA",contextual_note:"Tat kategorisi."},grammar_note:"Punjabi sweets (mithai) are world-famous: jalebi, gulab jamun, barfi, laddu."},{id:"a1-fd-014",order:14,punjabi:"Namkeen",punjabi_pronunciation:"num-KEEN",german:{translation:"Salzig / Herzhaft",pronunciation_guide:"num-KEEN",contextual_note:"Gegenteil von suess. Snacks."},turkish:{translation:"Tuzlu",pronunciation_guide:"num-KEEN",contextual_note:"Tatlinin zitti. Atistirmaliklar."},grammar_note:"'Namkeen' refers to both the taste (salty) and savory snacks like samosas and pakoras."},{id:"a1-fd-015",order:15,punjabi:"Khana khaa lo",punjabi_pronunciation:"KHAH-nah KHAH-lo",german:{translation:"Iss etwas! / Guten Appetit!",pronunciation_guide:"KHAH-nah KHAH-lo",contextual_note:"Einladung zum Essen. Immer gesagt vor Mahlzeiten."},turkish:{translation:"Yemek ye! / Afiyet olsun!",pronunciation_guide:"KHAH-nah KHAH-lo",contextual_note:"Yemek daveti. Yemeklerden oence soeylenir."},grammar_note:"Imperative form. 'Khana' = food (noun), 'khaa' = eat (verb). Combined: 'Eat food!'"}]},Ey={id:"a1-pronouns",level:"A1",category:"pronouns",sub_category:"Personal Pronouns",title:"Personal Pronouns",description:"Master the essential pronouns",icon:"User",total_phrases:12,xp_reward:50,phrases:[{id:"a1-p-001",order:1,punjabi:"Main",punjabi_pronunciation:"mein",german:{translation:"Ich",pronunciation_guide:"mein",contextual_note:"Grundpronomen. Immer grossgeschrieben in der Umschrift."},turkish:{translation:"Ben",pronunciation_guide:"mein",contextual_note:"Temel zamir."},grammar_note:"'Main' is the first person singular. Like 'ich/Ben', it doesn't change form in Punjabi."},{id:"a1-p-002",order:2,punjabi:"Tussi",punjabi_pronunciation:"too-SEE",german:{translation:"Sie (hoefflich) / Ihr",pronunciation_guide:"too-SEE",contextual_note:"Hoeffliche/formelle Form. Immer bei Fremden und Aelteren."},turkish:{translation:"Siz",pronunciation_guide:"too-SEE",contextual_note:"Saygili/resmi form. Yabancilara ve bueyueklere her zaman."},grammar_note:"'Tussi' = formal you (like Sie/siz). Use with strangers, elders, and in professional settings."},{id:"a1-p-003",order:3,punjabi:"Tu",punjabi_pronunciation:"tu",german:{translation:"Du",pronunciation_guide:"tu",contextual_note:"Informell. Nur mit Freunden, Familie, Kindern."},turkish:{translation:"Sen",pronunciation_guide:"tu",contextual_note:"Samimi. Sadece arkadaslar, aile, cocuklar icin."},grammar_note:"'Tu' = informal you (du/sen). Never use with elders or strangers - considered very rude in Punjab!"},{id:"a1-p-004",order:4,punjabi:"Oh",punjabi_pronunciation:"oh",german:{translation:"Er / Sie / Es",pronunciation_guide:"oh",contextual_note:"Geschlechtsneutral. Kontext bestimmt das Geschlecht."},turkish:{translation:"O",pronunciation_guide:"oh",contextual_note:"Cinsiyetten bagimsiz. Baglam belirler."},grammar_note:"Punjabi 'oh' is gender-neutral! Context or adjectives reveal gender. Like Turkish 'o'."},{id:"a1-p-005",order:5,punjabi:"Asi",punjabi_pronunciation:"uh-SEE",german:{translation:"Wir",pronunciation_guide:"uh-SEE",contextual_note:"Inklusiv und exklusiv moeglich."},turkish:{translation:"Biz",pronunciation_guide:"uh-SEE",contextual_note:"Icerir ve haric tutar kullanim mumkun."},grammar_note:"'Asi' = we (wir/biz). Punjabi also has an 'exclusive we' (excluding listener) but it's rarely used."},{id:"a1-p-006",order:6,punjabi:"Oh log",punjabi_pronunciation:"oh log",german:{translation:"Sie (Plural) / Die Leute",pronunciation_guide:"oh log",contextual_note:"Dritte Person Plural. 'Log' = Leute."},turkish:{translation:"Onlar",pronunciation_guide:"oh log",contextual_note:"Ueuncu tekil cogul. 'Log' = insanlar."},grammar_note:"'Log' means 'people'. 'Oh log' = those people = they/onlar."},{id:"a1-p-007",order:7,punjabi:"Mera / Meri",punjabi_pronunciation:"may-ra / may-REE",german:{translation:"Mein / Meine",pronunciation_guide:"may-ra",contextual_note:"'Mera' = maennlich. 'Meri' = weiblich."},turkish:{translation:"Benim / Benimki",pronunciation_guide:"may-ra",contextual_note:"'Mera' = eril. 'Meri' = disil."},grammar_note:"Possessive pronouns agree with the OWNED object, not the owner! Mera ghar (my house-masc) but Meri car (my car-fem)."},{id:"a1-p-008",order:8,punjabi:"Tuhada / Tuhadi",punjabi_pronunciation:"too-HAA-da / too-HAA-dee",german:{translation:"Ihr / Ihre (hoefflich)",pronunciation_guide:"too-HAA-da",contextual_note:"'Tuhada' = maennlich. 'Tuhadi' = weiblich."},turkish:{translation:"Sizin / Sizinki",pronunciation_guide:"too-HAA-da",contextual_note:"'Tuhada' = eril. 'Tuhadi' = disil."},grammar_note:"Like German 'Ihr/Ihre' and Turkish 'sizin'. Changes based on the gender of the possessed noun."},{id:"a1-p-009",order:9,punjabi:"Tera / Teri",punjabi_pronunciation:"tay-ra / tay-REE",german:{translation:"Dein / Deine (informell)",pronunciation_guide:"tay-ra",contextual_note:"'Tera' = maennlich. 'Teri' = weiblich. Nur mit Freunden!"},turkish:{translation:"Senin / Seninki",pronunciation_guide:"tay-ra",contextual_note:"'Tera' = eril. 'Teri' = disil. Sadece arkadaslarla!"},grammar_note:"Informal possessive. Remember: only use 'tera/teri' with close friends and family!"},{id:"a1-p-010",order:10,punjabi:"Ohda / Ohdi",punjabi_pronunciation:"oh-DA / oh-DEE",german:{translation:"Sein / Sein / Ihr / Ihre",pronunciation_guide:"oh-DA",contextual_note:"'Ohda' = er/sie/es (maennlich). 'Ohdi' = sie (weiblich)."},turkish:{translation:"Onun",pronunciation_guide:"oh-DA",contextual_note:"'Ohda' = o (eril). 'Ohdi' = o (disil)."},grammar_note:"Third person possessive. The gender matches the owned object, not the person."},{id:"a1-p-011",order:11,punjabi:"Sadha / Sadhi",punjabi_pronunciation:"suh-DHA / suh-DHEE",german:{translation:"Unser / Unsere",pronunciation_guide:"suh-DHA",contextual_note:"'Sadha' = maennlich. 'Sadhi' = weiblich."},turkish:{translation:"Bizim / Bizimki",pronunciation_guide:"suh-DHA",contextual_note:"'Sadha' = eril. 'Sadhi' = disil."},grammar_note:"First person plural possessive. Changes based on possessed noun's gender."},{id:"a1-p-012",order:12,punjabi:"Aapa",punjabi_pronunciation:"AA-pa",german:{translation:"Wir (inklusiv) / Man",pronunciation_guide:"AA-pa",contextual_note:"Inklusiv: Sprecher + Hoerer. Sehr gemeinschaftlich."},turkish:{translation:"Biz (kapsayici)",pronunciation_guide:"AA-pa",contextual_note:"Kapsayici: konusan + dinleyen. Cok toplulukcu."},grammar_note:"'Aapa' = inclusive 'we' (both speaker and listener). Reflects Punjabi communal culture."}]},Ny={id:"a1-verbs",level:"A1",category:"verbs",sub_category:"Essential Verbs",title:"Common Verbs",description:"The 20 most essential verbs for daily conversation",icon:"Activity",total_phrases:20,xp_reward:50,phrases:[{id:"a1-v-001",order:1,punjabi:"Karna",punjabi_pronunciation:"kar-NAA",german:{translation:"Machen / Tun",pronunciation_guide:"kar-NAA",contextual_note:"Das Universalverb! Fast wie 'machen' im Deutschen."},turkish:{translation:"Yapmak",pronunciation_guide:"kar-NAA",contextual_note:"Evrensel fiil! Almanca 'machen' gibi."},grammar_note:"Auxiliary verb used in countless compound verbs. 'Kam karna' = to work (work do)."},{id:"a1-v-002",order:2,punjabi:"Hona",punjabi_pronunciation:"ho-NAA",german:{translation:"Sein / Werden",pronunciation_guide:"ho-NAA",contextual_note:"Das Verb 'sein'. Unregelmaessig wie im Deutschen."},turkish:{translation:"Olmak",pronunciation_guide:"ho-NAA",contextual_note:"'Olmak' fiili. Duzensiz."},grammar_note:"Irregular verb. Present: haan/hai/han (I am/you are/he is). Like German sein/bin/ist."},{id:"a1-v-003",order:3,punjabi:"Jaana",punjabi_pronunciation:"jaa-NAA",german:{translation:"Gehen",pronunciation_guide:"jaa-NAA",contextual_note:"Bewegungsverb."},turkish:{translation:"Gitmek",pronunciation_guide:"jaa-NAA",contextual_note:"Hareket fiili."},grammar_note:"'Main jaanda haan' = I go = Ich gehe = Ben gidiyorum. SOV: I + go + am."},{id:"a1-v-004",order:4,punjabi:"Aana",punjabi_pronunciation:"aa-NAA",german:{translation:"Kommen",pronunciation_guide:"aa-NAA",contextual_note:"Gegenteil von 'gehen'."},turkish:{translation:"Gelmek",pronunciation_guide:"aa-NAA",contextual_note:"'Gitmek'in zitti."},grammar_note:"'Aaja!' = Come here! = Komm her! = Gel buraya! Imperative form."},{id:"a1-v-005",order:5,punjabi:"Khaana",punjabi_pronunciation:"KHAH-nah",german:{translation:"Essen",pronunciation_guide:"KHAH-nah",contextual_note:"'Khana' = Nahrung UND 'essen' (Verb)."},turkish:{translation:"Yemek (fiil)",pronunciation_guide:"KHAH-nah",contextual_note:"'Khana' = yemek (isim) VE 'yemek' (fiil)."},grammar_note:"Context distinguishes noun (food) from verb (to eat). 'Khana khaana' = to eat food!"},{id:"a1-v-006",order:6,punjabi:"Peena",punjabi_pronunciation:"pee-NAA",german:{translation:"Trinken",pronunciation_guide:"pee-NAA",contextual_note:"Fuer alle Getraenke."},turkish:{translation:"İçmek",pronunciation_guide:"pee-NAA",contextual_note:"Tuem icecekler icin."},grammar_note:"'Pani peena' = to drink water. 'Chai peeni' = to drink tea (note feminine 'i' ending)."},{id:"a1-v-007",order:7,punjabi:"Dena",punjabi_pronunciation:"day-NAA",german:{translation:"Geben",pronunciation_guide:"day-NAA",contextual_note:"Transitives Verb."},turkish:{translation:"Vermek",pronunciation_guide:"day-NAA",contextual_note:"Gecisli fiil."},grammar_note:"'Mujhe de do' = Give to me = Gib mir = Bana ver. Dative construction."},{id:"a1-v-008",order:8,punjabi:"Lena",punjabi_pronunciation:"lay-NAA",german:{translation:"Nehmen",pronunciation_guide:"lay-NAA",contextual_note:"Gegenteil von 'geben'."},turkish:{translation:"Almak",pronunciation_guide:"lay-NAA",contextual_note:"'Vermek'in zitti."},grammar_note:"'Lelo' = Take it! = Nimm! = Al! Common in shops and markets."},{id:"a1-v-009",order:9,punjabi:"Dekhna",punjabi_pronunciation:"dekh-NAA",german:{translation:"Sehen / Schauen",pronunciation_guide:"dekh-NAA",contextual_note:"'Dekho!' = Schau! / Guck mal!"},turkish:{translation:"Görmek / Bakmak",pronunciation_guide:"dekh-NAA",contextual_note:"'Dekho!' = Bak! / Bakin!"},grammar_note:"'Dekho' is the casual imperative. 'Vekho' is the formal version (used with 'tussi')."},{id:"a1-v-010",order:10,punjabi:"Sunana",punjabi_pronunciation:"soo-nuh-NAA",german:{translation:"Hoeren",pronunciation_guide:"soo-nuh-NAA",contextual_note:"'Sunao' = Erzaehl! / Hoer zu!"},turkish:{translation:"Duymak / Dinlemek",pronunciation_guide:"soo-nuh-NAA",contextual_note:"'Sunao' = Anlat! / Dinle!"},grammar_note:"'Sunao ji' = Listen please (formal). 'Mai sun reha haan' = I am listening."},{id:"a1-v-011",order:11,punjabi:"Bolna",punjabi_pronunciation:"bol-NAA",german:{translation:"Sprechen / Reden",pronunciation_guide:"bol-NAA",contextual_note:"'Bolo' = Sprich! / Sag schon!"},turkish:{translation:"Konuşmak",pronunciation_guide:"bol-NAA",contextual_note:"'Bolo' = Konus! / Soeyle!"},grammar_note:"'Punjabi bolde ho?' = Do you speak Punjabi? = Sprechen Sie Punjabi? = Pencapca konusuyor musunuz?"},{id:"a1-v-012",order:12,punjabi:"Samajhna",punjabi_pronunciation:"suh-MUJH-naa",german:{translation:"Verstehen",pronunciation_guide:"suh-MUJH-naa",contextual_note:"Wichtig beim Lernen!"},turkish:{translation:"Anlamak",pronunciation_guide:"suh-MUJH-naa",contextual_note:"Oegrenirken cok onemli!"},grammar_note:"'Samajh aaya?' = Understood? = Verstanden? = Anladin mi? Perfect SOV!"},{id:"a1-v-013",order:13,punjabi:"Likhna",punjabi_pronunciation:"likh-NAA",german:{translation:"Schreiben",pronunciation_guide:"likh-NAA",contextual_note:"Bildungskontext."},turkish:{translation:"Yazmak",pronunciation_guide:"likh-NAA",contextual_note:"Egitim baglami."},grammar_note:"'Chitthi likhni' = to write a letter. Notice feminine ending '-ni' on the auxiliary."},{id:"a1-v-014",order:14,punjabi:"Padhna",punjabi_pronunciation:"puth-NAA",german:{translation:"Lesen / Studieren",pronunciation_guide:"puth-NAA",contextual_note:"Beides: lesen UND lernen."},turkish:{translation:"Okumak / Çalışmak",pronunciation_guide:"puth-NAA",contextual_note:"Her ikisi: okumak VE ogrenmek."},grammar_note:"'Padhai' = study/education. Central concept in Punjabi families who value education highly."},{id:"a1-v-015",order:15,punjabi:"Sona",punjabi_pronunciation:"so-NAA",german:{translation:"Schlafen",pronunciation_guide:"so-NAA",contextual_note:"'Sona' (schlafen) vs 'sona' (Gold) - Kontext!"},turkish:{translation:"Uyumak",pronunciation_guide:"so-NAA",contextual_note:"'Sona' (uyumak) ve 'sona' (altin) - baglam!"},grammar_note:"Homophone! 'Sona' (sleep) and 'sona' (gold) are pronounced identically. Context resolves meaning."},{id:"a1-v-016",order:16,punjabi:"Baithna",punjabi_pronunciation:"baith-NAA",german:{translation:"Sitzen",pronunciation_guide:"baith-NAA",contextual_note:"'Baitho' = Setz dich! / Bitte nehmen Sie Platz."},turkish:{translation:"Otur-mak",pronunciation_guide:"baith-NAA",contextual_note:"'Baitho' = Otur! / Lueften oturun."},grammar_note:"'Baith jaao' = Sit down! = Setz dich! = Otur! 'Jaana' adds a sense of completion."},{id:"a1-v-017",order:17,punjabi:"Utthna",punjabi_pronunciation:"utth-NAA",german:{translation:"Aufstehen / Aufstehen",pronunciation_guide:"utth-NAA",contextual_note:"Morgenroutine."},turkish:{translation:"Kalkmak / Uyanmak",pronunciation_guide:"utth-NAA",contextual_note:"Sabah rutini."},grammar_note:"'Utth ja' = Wake up/Get up! = Steh auf! = Kalk! Common morning command."},{id:"a1-v-018",order:18,punjabi:"Chalna",punjabi_pronunciation:"chul-NAA",german:{translation:"Laufen / Gehen / Funktionieren",pronunciation_guide:"chul-NAA",contextual_note:"Universal wie 'gehen' im Deutschen."},turkish:{translation:"Yueruemek / Gitmek / Calismak",pronunciation_guide:"chul-NAA",contextual_note:"Evrensel, Almanca 'gehen' gibi."},grammar_note:"'Chal de' = Let's go! = Los geht's! = Hadi gidelim! Most common casual phrase."},{id:"a1-v-019",order:19,punjabi:"Rukna",punjabi_pronunciation:"ruk-NAA",german:{translation:"Anhalten / Stoppen",pronunciation_guide:"ruk-NAA",contextual_note:"'Ruk!' = Halt! / Stop!"},turkish:{translation:"Dur-mak",pronunciation_guide:"ruk-NAA",contextual_note:"'Ruk!' = Dur! / Stop!"},grammar_note:"'Ruk ja!' = Stop! = Halt! = Dur! Imperative with 'ja' = completion particle."},{id:"a1-v-020",order:20,punjabi:"Milna",punjabi_pronunciation:"mil-NAA",german:{translation:"Treffen / Finden / Bekommen",pronunciation_guide:"mil-NAA",contextual_note:"Sehr vielseitig! 'Mil ke khushi hoi' = Freut mich."},turkish:{translation:"Bulusmak / Bulmak / Almak",pronunciation_guide:"mil-NAA",contextual_note:"Cok yoenlue! 'Mil ke khushi hoi' = Tanistigima memnun oldum."},grammar_note:"Versatile verb! 'Milna' = to meet/to find/to get. 'Mujhe mil gaya' = I got it = Ich habe es bekommen."}]},Ty={id:"a1-questions",level:"A1",category:"questions",sub_category:"Question Words",title:"Question Words",description:"Essential WH-questions for basic conversation",icon:"HelpCircle",total_phrases:10,xp_reward:50,phrases:[{id:"a1-q-001",order:1,punjabi:"Ki?",punjabi_pronunciation:"kee",german:{translation:"Was?",pronunciation_guide:"kee",contextual_note:"Das wichtigste Fragewort."},turkish:{translation:"Ne?",pronunciation_guide:"kee",contextual_note:"En onemli soru kelimesi."},grammar_note:"'Ki' = what (ne/was). Always comes at the beginning of the question, like German and unlike Turkish."},{id:"a1-q-002",order:2,punjabi:"Kiven?",punjabi_pronunciation:"kee-VEN",german:{translation:"Wie?",pronunciation_guide:"kee-VEN",contextual_note:"Nach Art und Weise fragen."},turkish:{translation:"Nasıl?",pronunciation_guide:"kee-VEN",contextual_note:"Bicim ve yoenetimi sormak icin."},grammar_note:"'Kiven?' = How? = Wie? = Nasil? Used for both manner and state. 'Kiven ho?' = How are you?"},{id:"a1-q-003",order:3,punjabi:"Kithe?",punjabi_pronunciation:"kee-THEH",german:{translation:"Wo? / Wohin?",pronunciation_guide:"kee-THEH",contextual_note:"Ort oder Richtung."},turkish:{translation:"Nerede? / Nereye?",pronunciation_guide:"kee-THEH",contextual_note:"Yer veya yoenu."},grammar_note:"'Kithe jaande ho?' = Where are you going? = Wohin gehst du? = Nereye gidiyorsun?"},{id:"a1-q-004",order:4,punjabi:"Kadon?",punjabi_pronunciation:"kuh-DON",german:{translation:"Wann?",pronunciation_guide:"kuh-DON",contextual_note:"Zeitliche Fragen."},turkish:{translation:"Ne zaman?",pronunciation_guide:"kuh-DON",contextual_note:"Zaman sorulari."},grammar_note:"'Kadon aavoge?' = When will you come? = Wann kommst du? = Ne zaman geleceksin?"},{id:"a1-q-005",order:5,punjabi:"Kyon?",punjabi_pronunciation:"kyon",german:{translation:"Warum?",pronunciation_guide:"kyon",contextual_note:"Nach Gruenden fragen."},turkish:{translation:"Neden? / Niçin?",pronunciation_guide:"kyon",contextual_note:"Neden sormak icin."},grammar_note:"'Kyon nahi?' = Why not? = Warum nicht? = Neden olmasin? Very common retort."},{id:"a1-q-006",order:6,punjabi:"Koun?",punjabi_pronunciation:"koon",german:{translation:"Wer?",pronunciation_guide:"koon",contextual_note:"Nach Personen fragen."},turkish:{translation:"Kim?",pronunciation_guide:"koon",contextual_note:"Kisileri sormak icin."},grammar_note:"'Koun e?' = Who is it? = Wer ist das? = Kim o? Simple but essential."},{id:"a1-q-007",order:7,punjabi:"Kine?",punjabi_pronunciation:"kee-NAY",german:{translation:"Wie viel? / Wie viele?",pronunciation_guide:"kee-NAY",contextual_note:"Nach Menge oder Preis fragen."},turkish:{translation:"Kaç? / Ne kadar?",pronunciation_guide:"kee-NAY",contextual_note:"Miktar veya fiyat sormak icin."},grammar_note:"'Kine paisae?' = How much money? = Wie viel Geld? = Kac para? Essential for shopping!"},{id:"a1-q-008",order:8,punjabi:"Kis da / Kis di?",punjabi_pronunciation:"kis DAA / kis DEE",german:{translation:"Wessen?",pronunciation_guide:"kis DAA",contextual_note:"Nach Besitz fragen. 'Da' = maennlich, 'Di' = weiblich."},turkish:{translation:"Kimin?",pronunciation_guide:"kis DAA",contextual_note:"Sahiplik sormak icin. 'Da' = eril, 'Di' = disil."},grammar_note:"'Ki kitab e?' (What book is it?) vs 'Kis di kitab e?' (Whose book is it?). Notice the possessive form."},{id:"a1-q-009",order:9,punjabi:"Ki tusi ___ chaahunde ho?",punjabi_pronunciation:"kee too-SEE ___ chaa-HUN-deh ho",german:{translation:"Moechten Sie ___?",pronunciation_guide:"kee too-SEE chaa-HUN-deh ho",contextual_note:"Hoeffliches Angebot."},turkish:{translation:"___ ister misiniz?",pronunciation_guide:"kee too-SEE chaa-HUN-deh ho",contextual_note:"Kibar teklif."},grammar_note:"Chaahuna = to want/desire. 'Ki tusi chaahunde ho?' = What do you want? = Was moechten Sie? = Ne istersiniz?"},{id:"a1-q-010",order:10,punjabi:"___ kitthe e?",punjabi_pronunciation:"___ keet-THAY eh",german:{translation:"Wo ist ___?",pronunciation_guide:"___ keet-THAY eh",contextual_note:"Nach dem Ort von etwas fragen."},turkish:{translation:"___ nerede?",pronunciation_guide:"___ keet-THAY eh",contextual_note:"Bir seyin yerini sormak."},grammar_note:"Simple location question. 'Ghar kitthe e?' = Where is home? = Wo ist das Haus? = Ev nerede?"}]},zy={id:"a1-time",level:"A1",category:"time",sub_category:"Time & Days",title:"Time & Days",description:"Telling time and days of the week",icon:"Clock",total_phrases:14,xp_reward:50,phrases:[{id:"a1-t-001",order:1,punjabi:"Samah / Waqt",punjabi_pronunciation:"suh-MAAH / vahkt",german:{translation:"Zeit",pronunciation_guide:"suh-MAAH",contextual_note:"'Waqt' aus dem Arabischen. 'Samah' = traditionell."},turkish:{translation:"Zaman / Vakit",pronunciation_guide:"suh-MAAH",contextual_note:"'Waqt' Arapca kokenli. 'Samah' = geleneksel."},grammar_note:"Both words are used. 'Waqt' is Persian/Arabic loanword (like Turkish 'vakit')."},{id:"a1-t-002",order:2,punjabi:"Ghanta",punjabi_pronunciation:"GHUN-ta",german:{translation:"Stunde",pronunciation_guide:"GHUN-ta",contextual_note:"'Ek ghanta' = eine Stunde."},turkish:{translation:"Saat (suere)",pronunciation_guide:"GHUN-ta",contextual_note:"'Ek ghanta' = bir saat."},grammar_note:"Ghanta = hour. Also slang for 'nothing' in some contexts ('Ghanta ho gaya' = an hour passed)."},{id:"a1-t-003",order:3,punjabi:"Mint",punjabi_pronunciation:"mint",german:{translation:"Minute",pronunciation_guide:"mint",contextual_note:"Lehnwort aus dem Englischen."},turkish:{translation:"Dakika",pronunciation_guide:"mint",contextual_note:"Ingilizce'den odunc."},grammar_note:"English loanword. Traditional word 'pal' is rarely used now."},{id:"a1-t-004",order:4,punjabi:"Din",punjabi_pronunciation:"deen",german:{translation:"Tag",pronunciation_guide:"deen",contextual_note:"Wie 'Din' in vielen indischen Sprachen."},turkish:{translation:"Gün",pronunciation_guide:"deen",contextual_note:"Bircok Hint dilinde 'Din'."},grammar_note:"'Din' = day. 'Din ve raat' = day and night = Tag und Nacht = Guevenduez."},{id:"a1-t-005",order:5,punjabi:"Raat",punjabi_pronunciation:"raat",german:{translation:"Nacht",pronunciation_guide:"raat",contextual_note:"'Raat nu' = in der Nacht / nachts."},turkish:{translation:"Gece",pronunciation_guide:"raat",contextual_note:"'Raat nu' = geceleyin."},grammar_note:"'Subha' = morning, 'Dopahar' = afternoon, 'Shaam' = evening, 'Raat' = night."},{id:"a1-t-006",order:6,punjabi:"Subha",punjabi_pronunciation:"sub-HAH",german:{translation:"Morgen (Tageszeit)",pronunciation_guide:"sub-HAH",contextual_note:"Frueh am Morgen."},turkish:{translation:"Sabah",pronunciation_guide:"sub-HAH",contextual_note:"Sabahleyin."},grammar_note:"'Subhe di sat sri akaal' = Good morning! Literally: Morning's Sat Sri Akaal."},{id:"a1-t-007",order:7,punjabi:"Shaam",punjabi_pronunciation:"shaam",german:{translation:"Abend",pronunciation_guide:"shaam",contextual_note:"'Shaam nu' = am Abend."},turkish:{translation:"Akşam",pronunciation_guide:"shaam",contextual_note:"'Shaam nu' = aksamleyin."},grammar_note:"'Shaam da' = in the evening. Both from Persian/Arabic root (sha'am)."},{id:"a1-t-008",order:8,punjabi:"Somaar",punjabi_pronunciation:"so-MAAR",german:{translation:"Montag",pronunciation_guide:"so-MAAR",contextual_note:"Woche beginnt traditionell mit Somaar."},turkish:{translation:"Pazartesi",pronunciation_guide:"so-MAAR",contextual_note:"Geleneksel olarak hafta Pazartesi baslar."},grammar_note:"'Som' = moon (like Luna/Monday). All days follow planetary naming like many languages."},{id:"a1-t-009",order:9,punjabi:"Mangal",punjabi_pronunciation:"mun-GUL",german:{translation:"Dienstag",pronunciation_guide:"mun-GUL",contextual_note:"Nach dem Planeten Mars benannt."},turkish:{translation:"Salı",pronunciation_guide:"mun-GUL",contextual_note:"Mars gezegeninden adini alir."},grammar_note:"'Mangal' = Mars. Tuesday is Mars-day in many language traditions (cf. French Mardi)."},{id:"a1-t-010",order:10,punjabi:"Budh",punjabi_pronunciation:"boodh",german:{translation:"Mittwoch",pronunciation_guide:"boodh",contextual_note:"Nach dem Planeten Merkur."},turkish:{translation:"Çarşamba",pronunciation_guide:"boodh",contextual_note:"Merkuer gezegeninden."},grammar_note:"'Budh' = Mercury. Like English Wednesday (Woden's day) and Turkish Carsamba."},{id:"a1-t-011",order:11,punjabi:"Veervaar",punjabi_pronunciation:"VEER-vaar",german:{translation:"Sonntag",pronunciation_guide:"VEER-vaar",contextual_note:"'Veer' = Held/Bruder. Tag des Helden."},turkish:{translation:"Pazar",pronunciation_guide:"VEER-vaar",contextual_note:"'Veer' = kahraman/kardes. Kahramanlar guenue."},grammar_note:"'Veer' = brother/hero. The week-ender day. Also called 'Itvaar' in some regions."},{id:"a1-t-012",order:12,punjabi:"Shanivaar",punjabi_pronunciation:"shuh-NEE-vaar",german:{translation:"Samstag",pronunciation_guide:"shuh-NEE-vaar",contextual_note:"Nach dem Planeten Saturn."},turkish:{translation:"Cumartesi",pronunciation_guide:"shuh-NEE-vaar",contextual_note:"Saturn gezegeninden."},grammar_note:"'Shani' = Saturn. Like English Saturday and Turkish Cumartesi."},{id:"a1-t-013",order:13,punjabi:"Hun",punjabi_pronunciation:"hun",german:{translation:"Jetzt",pronunciation_guide:"hun",contextual_note:"Zeitpunkt in der Gegenwart."},turkish:{translation:"Şimdi",pronunciation_guide:"hun",contextual_note:"Suedeki zaman."},grammar_note:"'Hun ki karde ho?' = What are you doing now? = Was machst du jetzt? = Simdi ne yapıyorsun?"},{id:"a1-t-014",order:14,punjabi:"Phir / Fer",punjabi_pronunciation:"feer",german:{translation:"Dann / Spaeter / Wieder",pronunciation_guide:"feer",contextual_note:"Sehr vielseitig! 'Phir milange' = Bis spaeter!"},turkish:{translation:"Sonra / Tekrar / Görüşürüz",pronunciation_guide:"feer",contextual_note:"Cok yoenlue! 'Phir milange' = Sonra gorusuruz!"},grammar_note:"'Phir milange' = We'll meet again = Wir sehen uns wieder = Sonra gorusuruz. Most common goodbye!"}]},Hy={id:"a1-colors",level:"A1",category:"colors",sub_category:"Basic Colors",title:"Colors",description:"Essential color vocabulary",icon:"Palette",total_phrases:10,xp_reward:50,phrases:[{id:"a1-cl-001",order:1,punjabi:"Laal",punjabi_pronunciation:"laal",german:{translation:"Rot",pronunciation_guide:"laal",contextual_note:"Die Farbe der Brautkleider in Punjab!"},turkish:{translation:"Kırmızı",pronunciation_guide:"laal",contextual_note:"Pencap'ta gelinliklerin rengi!"},grammar_note:"Laal is sacred in Punjabi weddings. Brides wear laal chunni (red veil)."},{id:"a1-cl-002",order:2,punjabi:"Neela",punjabi_pronunciation:"nee-LAA",german:{translation:"Blau",pronunciation_guide:"nee-LAA",contextual_note:"Farbe des Himmels und des Wassers."},turkish:{translation:"Mavi",pronunciation_guide:"nee-LAA",contextual_note:"Goey ve suyun rengi."},grammar_note:"'Neela aasmaan' = Blue sky. Adjectives come before the noun in Punjabi (unlike SOV structure)."},{id:"a1-cl-003",order:3,punjabi:"Peela",punjabi_pronunciation:"pee-LAA",german:{translation:"Gelb",pronunciation_guide:"pee-LAA",contextual_note:"Farbe des Senfs und der Freude."},turkish:{translation:"Sarı",pronunciation_guide:"pee-LAA",contextual_note:"Hardal ve sevincin rengi."},grammar_note:"'Peela' = yellow. Turmeric (haldi) gives this color its cultural significance in ceremonies."},{id:"a1-cl-004",order:4,punjabi:"Hara",punjabi_pronunciation:"huh-RAA",german:{translation:"Gruen",pronunciation_guide:"huh-RAA",contextual_note:"Farbe der Natur und des Wachstums."},turkish:{translation:"Yeşil",pronunciation_guide:"huh-RAA",contextual_note:"Dog�anin ve bueyuemenin rengi."},grammar_note:"'Hara' = green. The color of prosperity and new beginnings in Punjabi culture."},{id:"a1-cl-005",order:5,punjabi:"Safed",punjabi_pronunciation:"suh-FAYD",german:{translation:"Weiss",pronunciation_guide:"suh-FAYD",contextual_note:"Farbe der Reinheit."},turkish:{translation:"Beyaz",pronunciation_guide:"suh-FAYD",contextual_note:"Safligin rengi."},grammar_note:"'Safed' from Persian. White is worn at funerals and religious ceremonies in some traditions."},{id:"a1-cl-006",order:6,punjabi:"Kala",punjabi_pronunciation:"kuh-LAA",german:{translation:"Schwarz",pronunciation_guide:"kuh-LAA",contextual_note:"Farbe der Eleganz."},turkish:{translation:"Siyah",pronunciation_guide:"kuh-LAA",contextual_note:"Zarafetin rengi."},grammar_note:"'Kala' = black. Also used for dark-skinned people (not offensive in Punjabi context)."},{id:"a1-cl-007",order:7,punjabi:"Gulabi",punjabi_pronunciation:"gu-LAA-bee",german:{translation:"Rosa / Pink",pronunciation_guide:"gu-LAA-bee",contextual_note:"Wie die Rose ('gulab')."},turkish:{translation:"Pembe",pronunciation_guide:"gu-LAA-bee",contextual_note:"Guel gibi ('gulab')."},grammar_note:"'Gulabi' = rose-colored. From 'gulab' = rose. Like English 'rose-colored'."},{id:"a1-cl-008",order:8,punjabi:"Bhura",punjabi_pronunciation:"boo-RAA",german:{translation:"Braun",pronunciation_guide:"boo-RAA",contextual_note:"Erdfarbe."},turkish:{translation:"Kahverengi",pronunciation_guide:"boo-RAA",contextual_note:"Toprak rengi."},grammar_note:"'Bhura' = brown/earthy color. Common description for wheat fields and earth in Punjab."},{id:"a1-cl-009",order:9,punjabi:"Badaami",punjabi_pronunciation:"buh-DAA-mee",german:{translation:"Beige / Mandel",pronunciation_guide:"buh-DAA-mee",contextual_note:"Nach der Mandel benannt."},turkish:{translation:"Bej / Badem rengi",pronunciation_guide:"buh-DAA-mee",contextual_note:"Bademden adini alir."},grammar_note:"'Badam' = almond (from Persian/Turkish 'badem'). Color of almond skin."},{id:"a1-cl-010",order:10,punjabi:"Mainu ___ pasand e",punjabi_pronunciation:"muh-NOO ___ puh-SUND eh",german:{translation:"Ich mag ___ / Ich bevorzuge ___",pronunciation_guide:"muh-NOO puh-SUND eh",contextual_note:"Geschmack ausdruecken."},turkish:{translation:"___ seviyorum / ___ hosuma gidiyor",pronunciation_guide:"muh-NOO puh-SUND eh",contextual_note:"Zevk belirtmek."},grammar_note:"'Pasand' = like/preference. 'Mainu laal pasand e' = I like red = Ich mag rot = Kırmızı seviyorum."}]},wy={id:"a1-directions",level:"A1",category:"directions",sub_category:"Basic Directions",title:"Directions & Places",description:"Finding your way around town",icon:"MapPin",total_phrases:12,xp_reward:50,phrases:[{id:"a1-d-001",order:1, rammar_note:"'Ghar' = home. The concept of 'ghar' carries deep emotional weight in Punjabi culture."},{id:"a1-d-007",order:7,punjabi:"School",punjabi_pronunciation:"skool",german:{translation:"Schule",pronunciation_guide:"skool",contextual_note:"Englisches Lehnwort."},turkish:{translation:"Okul",pronunciation_guide:"skool",contextual_note:"Ingilizce odunc soezcuek."},grammar_note:"English loanword. Traditional: 'Vidyalya' (Sanskrit) but rarely used now."},{id:"a1-d-008",order:8,punjabi:"Bazaar / Market",punjabi_pronunciation:"buh-ZAAR / MAR-kut",german:{translation:"Markt / Basar",pronunciation_guide:"buh-ZAAR",contextual_note:"Einkaufsstrasse. 'Bazaar' = persisches Lehnwort."},turkish:{translation:"Pazar / Çarşı / Market",pronunciation_guide:"buh-ZAAR",contextual_note:"Alisveris yeri. 'Bazaar' Farsea kokenli."},grammar_note:"'Bazaar' from Persian, like Turkish 'pazar'. The heart of any Punjabi town."},{id:"a1-d-009",order:9,punjabi:"Haspataal",punjabi_pronunciation:"hus-puh-TAAL",german:{translation:"Krankenhaus",pronunciation_guide:"hus-puh-TAAL",contextual_note:"Aus dem Sanskrit."},turkish:{translation:"Hastane",pronunciation_guide:"hus-puh-TAAL",contextual_note:"Sanskritce'den."},grammar_note:"Note similarity: Haspataal / Hastane / Hospital. Shared medical terminology."},{id:"a1-d-010",order:10,punjabi:"Gurdwara",punjabi_pronunciation:"gur-DWAA-ra",german:{translation:"Sikh-Tempel",pronunciation_guide:"gur-DWAA-ra",contextual_note:"'Guru dwar' = Tor zum Guru."},turkish:{translation:"Sikh tapınağı",pronunciation_guide:"gur-DWAA-ra",contextual_note:"'Guru kapisi' = Guru'nun kapi."},grammar_note:"'Gurdwara' = Guru's door. Open to all regardless of religion, caste, or gender."},{id:"a1-d-011",order:11,punjabi:"Masjid / Mandir",punjabi_pronunciation:"MUS-jid / mun-DEER",german:{translation:"Moschee / Tempel",pronunciation_guide:"MUS-jid",contextual_note:"Religioese Staetten."},turkish:{translation:"Cami / Tapınak",pronunciation_guide:"MUS-jid",contextual_note:"Dini mekanlar."},grammar_note:"Punjab is religiously diverse. Both mosques and temples coexist. 'Masjid' = Arabic origin."},{id:"a1-d-012",order:12,punjabi:"Station",punjabi_pronunciation:"STAY-shun",german:{translation:"Bahnhof / Station",pronunciation_guide:"STAY-shun",contextual_note:"Englisches Lehnwort."},turkish:{translation:"İstasyon / Gar",pronunciation_guide:"STAY-shun",contextual_note:"Ingilizce odunc soezcuek."},grammar_note:"English loanword. 'Bus station', 'train station' = 'bus station', 'train station' (same words!)."}]},Dy={id:"a2-daily",level:"A2",category:"daily_routine",sub_category:"Daily Activities",title:"Daily Routine",description:"Describe your typical day from morning to night",icon:"Calendar",total_phrases:15,xp_reward:75,phrases:[{id:"a2-dr-001",order:1,punjabi:"Main utthdaa haan",punjabi_pronunciation:"mein uth-DAA haan",german:{translation:"Ich stehe auf",pronunciation_guide:"mein uth-DAA haan",contextual_note:"Fuer Maenner. Frauen: 'Main utthdi haan'"},turkish:{translation:"Kalkıyorum",pronunciation_guide:"mein uth-DAA haan",contextual_note:"Erkekler icin. Kadinlar: 'Main utthdi haan'"},grammar_note:"Present habitual: Verb stem + -da/-di (gender) + haan. 'Utthda' (masc) / 'Utthdi' (fem)."},{id:"a2-dr-002",order:2,punjabi:"Nahaaunda haan",punjabi_pronunciation:"nuh-HOON-daa haan",german:{translation:"Ich dusche / bade mich",pronunciation_guide:"nuh-HOON-daa haan",contextual_note:"Taegliche Koerperpflege."},turkish:{translation:"Duş alıyorum / Yıkanıyorum",pronunciation_guide:"nuh-HOON-daa haan",contextual_note:"Guenluek vucuet bakimi."},grammar_note:"'Nahaana' = to bathe. Habitual present with -da/-di suffix. Like Turkish '-ıyor' ending."},{id:"a2-dr-003",order:3,punjabi:"Nasta kardee haan",punjabi_pronunciation:"NUS-tuh kar-DEE haan",german:{translation:"Ich fruehstuecke",pronunciation_guide:"NUS-tuh kar-DEE haan",contextual_note:"'Nasta' = Fruehstueck (Snack). 'Karna' = machen."},turkish:{translation:"Kahvaltı yapıyorum",pronunciation_guide:"NUS-tuh kar-DEE haan",contextual_note:"'Nasta' = kahvalti. 'Karna' = yapmak."},grammar_note:"'Nasta karna' = to have breakfast. Compound verb: noun + karna (like Turkish 'kahvalti yapmak')."},{id:"a2-dr-004",order:4,punjabi:"Kam te jaana",punjabi_pronunciation:"kum tay jaa-NAA",german:{translation:"Zur Arbeit gehen",pronunciation_guide:"kum tay jaa-NAA",contextual_note:"'Kam' = Arbeit. 'Te' = zu (Postposition)."},turkish:{translation:"İse gitmek",pronunciation_guide:"kum tay jaa-NAA",contextual_note:"'Kam' = is. 'Te' = -e/-a (edat)."},grammar_note:"'Te' is a postposition (like Turkish '-e/-a'). Comes AFTER the noun: 'kam te' = to work."},{id:"a2-dr-005",order:5,punjabi:"School ton vaapas",punjabi_pronunciation:"skool ton vaa-PUS",german:{translation:"Zurueck von der Schule",pronunciation_guide:"skool ton vaa-PUS",contextual_note:"'Ton' = von (Postposition). 'Vaapas' = zurueck."},turkish:{translation:"Okuldan geri",pronunciation_guide:"skool ton vaa-PUS",contextual_note:"'Ton' = -dan/-ten (edat). 'Vaapas' = geri."},grammar_note:"'Ton' = from (ablative). Like Turkish '-dan/-den'. Postposition follows the noun."},{id:"a2-dr-006",order:6,punjabi:"Roti khaani e",punjabi_pronunciation:"ro-TEE KHAH-nee eh",german:{translation:"Ich muss/moechte essen",pronunciation_guide:"ro-TEE KHAH-nee eh",contextual_note:"'Khaani' = weibliche Form des Verbs (Roti ist weiblich)."},turkish:{translation:"Yemek yemem lazım",pronunciation_guide:"ro-TEE KHAH-nee eh",contextual_note:"'Khaani' = disil fiil formu (roti disil)."},grammar_note:"Verb agrees with OBJECT's gender! 'Roti' is feminine so 'khaani' (not 'khaana')."},{id:"a2-dr-007",order:7,punjabi:"Kitab padhni e",punjabi_pronunciation:"kee-TUB pudh-NEE eh",german:{translation:"Ich muss lernen / lesen",pronunciation_guide:"kee-TUB pudh-NEE eh",contextual_note:"'Kitab' = Buch (weiblich in Punjabi)."},turkish:{translation:"Kitap okumam lazım",pronunciation_guide:"kee-TUB pudh-NEE eh",contextual_note:"'Kitab' = kitap (Pencapca'da disil)."},grammar_note:"'Kitab' is feminine! So 'padhni' not 'padhna'. Gender agreement with the object noun."},{id:"a2-dr-008",order:8,punjabi:"Sair karnee e",punjabi_pronunciation:"sair kar-NEE eh",german:{translation:"Spazieren gehen / Ausflug",pronunciation_guide:"sair kar-NEE eh",contextual_note:"'Sair' = Spaziergang. 'Karna' = machen."},turkish:{translation:"Gezmek / Yuerueyus yapmak",pronunciation_guide:"sair kar-NEE eh",contextual_note:"'Sair' = gezinti. 'Karna' = yapmak."},grammar_note:"'Sair karna' = to go for a walk. Common evening activity in Punjabi families."},{id:"a2-dr-009",order:9,punjabi:"TV vekhdaa haan",punjabi_pronunciation:"TEE-VEE vekh-DAA haan",german:{translation:"Ich schaue fern",pronunciation_guide:"TEE-VEE vekh-DAA haan",contextual_note:"'Vekhna' = sehen/schauen."},turkish:{translation:"Televizyon izliyorum",pronunciation_guide:"TEE-VEE vekh-DAA haan",contextual_note:"'Vekhna' = goermek/izlemek."},grammar_note:"'Vekhna' = to see/watch. Note: TV is feminine in Punjabi, but 'vekh' agrees with the subject here."},{id:"a2-dr-010",order:10,punjabi:"Sau jandaa haan",punjabi_pronunciation:"sow jun-DAA haan",german:{translation:"Ich gehe schlafen",pronunciation_guide:"sow jun-DAA haan",contextual_note:"'Sau' = Schlaf. 'Jana' = gehen (Vollendung)."},turkish:{translation:"Uyumaya gidiyorum",pronunciation_guide:"sow jun-DAA haan",contextual_note:"'Sau' = uyku. 'Jana' = gitmek (tamamlama)."},grammar_note:"'Sau jaana' = to go to sleep. Compound verb showing completion - like Turkish 'uyumaya gitmek'."},{id:"a2-dr-011",order:11,punjabi:"Kam kar reha haan",punjabi_pronunciation:"kum kar RAY-ha haan",german:{translation:"Ich arbeite (gerade)",pronunciation_guide:"kum kar RAY-ha haan",contextual_note:"Progressiv: Gegenwart. 'Reha' = gerade dabei."},turkish:{translation:"Calısıyorum (suan)",pronunciation_guide:"kum kar RAY-ha haan",contextual_note:"Suerdueruegen: simdiki zaman. 'Reha' = suanda."},grammar_note:"Progressive aspect: kar reha haan = am doing = yapıyorum. 'Reha/rehi' = continuous marker."},{id:"a2-dr-012",order:12,punjabi:"School jaandee haan",punjabi_pronunciation:"skool joon-DEE haan",german:{translation:"Ich gehe zur Schule (Frau)",pronunciation_guide:"skool joon-DEE haan",contextual_note:"Frauenform: '-dee' statt '-daa'."},turkish:{translation:"Okula gidiyorum (kadin)",pronunciation_guide:"skool joon-DEE haan",contextual_note:"Kadin formu: '-dee' yerine '-daa'."},grammar_note:"Feminine habitual: -di/-dee. 'Main jaandee haan' (I-fem go) = Ben gidiyorum."},{id:"a2-dr-013",order:13,punjabi:"Dostaan naal milna",punjabi_pronunciation:"doh-STAN naal mil-NAA",german:{translation:"Sich mit Freunden treffen",pronunciation_guide:"doh-STAN naal mil-NAA",contextual_note:"'Naal' = mit (Postposition)."},turkish:{translation:"Arkadaslarla bulusmak",pronunciation_guide:"doh-STAN naal mil-NAA",contextual_note:"'Naal' = ile (edat)."},grammar_note:"'Naal' = with. Postposition: 'dostaan naal' = with friends. Like Turkish '-la/-le'."},{id:"a2-dr-014",order:14,punjabi:"Phone te gall karnee",punjabi_pronunciation:"fon tay gull kar-NEE",german:{translation:"Am Telefon sprechen",pronunciation_guide:"fon tay gull kar-NEE",contextual_note:"'Gall' = Gespraech. 'Karna' = machen."},turkish:{translation:"Telefonda konusmak",pronunciation_guide:"fon tay gull kar-NEE",contextual_note:"'Gall' = konusma. 'Karna' = yapmak."},grammar_note:"'Gall karna' = to talk/speak. 'Phone te gall karni' = to talk on phone."},{id:"a2-dr-015",order:15,punjabi:"Din kive lang gaya?",punjabi_pronunciation:"deen kee-VAY lung guh-YAA",german:{translation:"Wie war dein Tag?",pronunciation_guide:"deen kee-VAY lung guh-YAA",contextual_note:"Tagesabschlussfrage."},turkish:{translation:"Guenun nasil gecti?",pronunciation_guide:"deen kee-VAY lung guh-YAA",contextual_note:"Guen sonu sorusu."},grammar_note:"'Langna' = to pass (time). Past tense: 'lang gaya' = passed/went by."}]},My={id:"a2-shopping",level:"A2",category:"shopping",sub_category:"At the Market",title:"Shopping & Money",description:"Navigate markets and handle transactions",icon:"ShoppingCart",total_phrases:14,xp_reward:75,phrases:[{id:"a2-s-001",order:1,punjabi:"Kine da e?",punjabi_pronunciation:"kee-NAY daa eh",german:{translation:"Wie viel kostet das?",pronunciation_guide:"kee-NAY daa eh",contextual_note:"Die wichtigste Einkaufsfrage!"},turkish:{translation:"Bu ne kadar?",pronunciation_guide:"kee-NAY daa eh",contextual_note:"En onemli alisveris sorusu!"},grammar_note:"'Da' = of (price). Literally: 'Of what price is it?' = Turkish 'Ne kadar?' = German 'Was kostet?'"},{id:"a2-s-002",order:2,punjabi:"Mehangaa",punjabi_pronunciation:"may-HUN-gaa",german:{translation:"Teuer",pronunciation_guide:"may-HUN-gaa",contextual_note:"Beim Feilschen! 'Bohut mehangaa e!'"},turkish:{translation:"Pahalı",pronunciation_guide:"may-HUN-gaa",contextual_note:"Pazarlikta! 'Cok pahalı!'"},grammar_note:"'Mehangi' = feminine form (for feminine nouns). Negotiating is expected in Punjabi bazaars!"},{id:"a2-s-003",order:3,punjabi:"Sasta",punjabi_pronunciation:"SUS-ta",german:{translation:"Billig / Guenstig",pronunciation_guide:"SUS-ta",contextual_note:"Gegenteil von teuer."},turkish:{translation:"Ucuz",pronunciation_guide:"SUS-ta",contextual_note:"Pahalinin zitti."},grammar_note:"'Sasti' = feminine. 'Koi sasta dekhana' = Show me a cheaper one = Ucuz biri goester."},{id:"a2-s-004",order:4,punjabi:"Paisae",punjabi_pronunciation:"puh-SAY",german:{translation:"Geld",pronunciation_guide:"puh-SAY",contextual_note:"Umgangssprachlich. 'Rupaye' = offiziell."},turkish:{translation:"Para",pronunciation_guide:"puh-SAY",contextual_note:"Guelnluek konusma. 'Rupaye' = resmi."},grammar_note:"'Paisae' = money (colloquial). 'Rupaye' = rupees (official currency name)."},{id:"a2-s-005",order:5,punjabi:"Bakshish / Tip",punjabi_pronunciation:"buk-SHEESH",german:{translation:"Trinkgeld",pronunciation_guide:"buk-SHEESH",contextual_note:"Servicepersonal. Nicht ueberall ueblich."},turkish:{translation:"Bahsis",pronunciation_guide:"buk-SHEESH",contextual_note:"Servis personeli. Her yerde yaygin degil."},grammar_note:"'Bakshish' from Persian. Less common in Punjab than in Western countries but appreciated."},{id:"a2-s-006",order:6,punjabi:"Mujhe ___ chahida e",punjabi_pronunciation:"muj-CHEH ___ chaa-HEE-daa eh",german:{translation:"Ich moechte ___ haben / Ich brauche ___",pronunciation_guide:"muj-CHEH chaa-HEE-daa eh",contextual_note:"Hoefliche Bitte beim Einkaufen."},turkish:{translation:"___ istiyorum / ___ ihtiyacim var",pronunciation_guide:"muj-CHEH chaa-HEE-daa eh",contextual_note:"Kibar rica alisveriste."},grammar_note:"'Chahida' = needed/wanted. Dative subject: 'Mujhe' = to me (dative). Like Turkish 'Bana lazim'."},{id:"a2-s-007",order:7,punjabi:"De do / De diyo",punjabi_pronunciation:"day do / day DEE-yo",german:{translation:"Geben Sie (bitte)",pronunciation_guide:"day do",contextual_note:"'De do' = informell. 'De diyo' = formell/hoefflich."},turkish:{translation:"Verin (lueften)",pronunciation_guide:"day do",contextual_note:"'De do' = samimi. 'De diyo' = resmi/kibar."},grammar_note:"Imperative with respect levels: 'de' (give) + 'do' (casual) / 'diyo' (formal). Like Turkish 'ver' vs 'verin'."},{id:"a2-s-008",order:8,punjabi:"Vazan",punjabi_pronunciation:"vuh-ZUN",german:{translation:"Gewicht / Wiegen",pronunciation_guide:"vuh-ZUN",contextual_note:"'Kitna vazan?' = Wie schwer?"},turkish:{translation:"Agirlik / Tartmak",pronunciation_guide:"vuh-ZUN",contextual_note:"'Kitna vazan?' = Ne kadar agir?"},grammar_note:"'Kitna vazan e?' = How much does it weigh? Important for buying produce by weight."},{id:"a2-s-009",order:9,punjabi:"Kilo",punjabi_pronunciation:"KEE-lo",german:{translation:"Kilo",pronunciation_guide:"KEE-lo",contextual_note:"Universal. Kilogramm."},turkish:{translation:"Kilo",pronunciation_guide:"KEE-lo",contextual_note:"Evrensel. Kilogram."},grammar_note:"Universal measurement. 'Ik kilo' = 1 kilo. 'Do kilo aloo' = 2 kilos of potatoes."},{id:"a2-s-010",order:10,punjabi:"Thaila / Bag",punjabi_pronunciation:"thai-LAA",german:{translation:"Tuete / Tasche",pronunciation_guide:"thai-LAA",contextual_note:"Fuer Einkauefe. 'Thaila' = Stofftuete."},turkish:{translation:"Poset / Torba",pronunciation_guide:"thai-LAA",contextual_note:"Alisveris icin. 'Thaila' = bez torba."},grammar_note:"Many shops in Punjab now charge for plastic bags. Bring your own 'thaila'!"},{id:"a2-s-011",order:11,punjabi:"Baki paisae?",punjabi_pronunciation:"buh-KEE puh-SAY",german:{translation:"Wechselgeld? / Restgeld?",pronunciation_guide:"buh-KEE puh-SAY",contextual_note:"Nach dem Wechselgeld fragen."},turkish:{translation:"Para uestu?",pronunciation_guide:"buh-KEE puh-SAY",contextual_note:"Para uestu sormak."},grammar_note:"'Baki' = remaining/change. Important to check your change in busy markets!"},{id:"a2-s-012",order:12,punjabi:"Daam ghat karo",punjabi_pronunciation:"daam ghat KUH-ro",german:{translation:"Senken Sie den Preis! / Feilschen!",pronunciation_guide:"daam ghat KUH-ro",contextual_note:"Punjab's Maerkte: Feilschen ist erwartet!"},turkish:{translation:"Fiyat indirin! / Pazarlik!",pronunciation_guide:"daam ghat KUH-ro",contextual_note:"Pencap pazarlarinda: pazarlik beklenir!"},grammar_note:"'Ghat' = less/reduce. 'Daam ghat karo' = Reduce the price! Haggling is a social art in Punjab!"},{id:"a2-s-013",order:13,punjabi:"Ley aa ya",punjabi_pronunciation:"lay aa-YAA",german:{translation:"Ich habe es genommen / Ich nehme es",pronunciation_guide:"lay aa-YAA",contextual_note:"Kaufentscheidung."},turkish:{translation:"Aldim / Bunu aliyorum",pronunciation_guide:"lay aa-YAA",contextual_note:"Satin alma karari."},grammar_note:"'Ley aana' = to take and bring. 'Ley aa ya' = I took it (past tense, masculine)."},{id:"a2-s-014",order:14,punjabi:"Vadia raftar!",punjabi_pronunciation:"vuh-DEE-aa ruf-TUR",german:{translation:"Gute Qualitaet! / Erstklassig!",pronunciation_guide:"vuh-DEE-aa ruf-TUR",contextual_note:"Qualitaet loben beim Einkaufen."},turkish:{translation:"Kaliteli! / Birinci sinif!",pronunciation_guide:"vuh-DEE-aa ruf-TUR",contextual_note:"Alisveriste kalite oegmek."},grammar_note:"'Vadia' = excellent/great. 'Raftar' = quality/grade. Common praise for good merchandise."}]},Ry={id:"a2-restaurant",level:"A2",category:"restaurant",sub_category:"Ordering Food",title:"At the Restaurant",description:"Order food, ask about menu, handle bills",icon:"ChefHat",total_phrases:14,xp_reward:75,phrases:[{id:"a2-r-001",order:1,punjabi:"Menu lai ke aavo",punjabi_pronunciation:"MAY-noo LAI-kay aa-VO",german:{translation:"Bringen Sie die Speisekarte",pronunciation_guide:"MAY-noo LAI-kay aa-VO",contextual_note:"Hoeffliche Bitte im Restaurant."},turkish:{translation:"Menu getirin",pronunciation_guide:"MAY-noo LAI-kay aa-VO",contextual_note:"Restoranda kibar rica."},grammar_note:"Imperative with 'laike aavo' = bring (with respect). 'Aavo' = formal come/bring."},{id:"a2-r-002",order:2,punjabi:"Ki ki hai menu ch?",punjabi_pronunciation:"kee kee hai MAY-noo ch",german:{translation:"Was gibt es auf der Speisekarte?",pronunciation_guide:"kee kee hai MAY-noo ch",contextual_note:"Nach der Auswahl fragen."},turkish:{translation:"Menude ne var?",pronunciation_guide:"kee kee hai MAY-noo ch",contextual_note:"Secenekleri sormak."},grammar_note:"'Ch' = in (postposition). 'Menu ch' = in the menu. Like Turkish 'menude'."},{id:"a2-r-003",order:3,punjabi:"Vegetarian khana",punjabi_pronunciation:"VEJ-tuh-ree-un KHAH-nah",german:{translation:"Vegetarisches Essen",pronunciation_guide:"VEJ-tuh-ree-un KHAH-nah",contextual_note:"Viele Punjabier sind vegetarisch."},turkish:{translation:"Vejeteryan yemek",pronunciation_guide:"VEJ-tuh-ree-un KHAH-nah",contextual_note:"Bircok Pencapli vejeteryandir."},grammar_note:"'Vegetarian' = English loanword. Many Punjabis are vegetarian for religious reasons."},{id:"a2-r-004",order:4,punjabi:"Non-veg chahida",punjabi_pronunciation:"non-VEJ chaa-HEE-daa",german:{translation:"Nicht-vegetarisch (gewuenscht)",pronunciation_guide:"non-VEJ chaa-HEE-daa",contextual_note:"Fleischgerichte."},turkish:{translation:"Etli isteniyor",pronunciation_guide:"non-VEJ chaa-HEE-daa",contextual_note:"Et yemekleri."},grammar_note:"'Non-veg' = common shorthand for non-vegetarian. Widely understood across India."},{id:"a2-r-005",order:5,punjabi:"Thoda tikha",punjabi_pronunciation:"tho-DAH TEEK-ha",german:{translation:"Etwas scharf",pronunciation_guide:"tho-DAH TEEK-ha",contextual_note:"Punjab-Essen ist normalerweise sehr scharf!"},turkish:{translation:"Biraz aci",pronunciation_guide:"tho-DAH TEEK-ha",contextual_note:"Pencap yemekleri genellikle cok acilidir!"},grammar_note:"'Tikha' = spicy. Punjabi food is famous for being spicy! 'Thoda' = a little (slightly)."},{id:"a2-r-006",order:6,punjabi:"Jyada tikha nahi",punjabi_pronunciation:"JYAA-dah TEEK-ha nuh-HEE",german:{translation:"Nicht zu scharf",pronunciation_guide:"JYAA-dah TEEK-ha nuh-HEE",contextual_note:"Wenn man nicht so viel Scharf vertraegt."},turkish:{translation:"Cok aci degil",pronunciation_guide:"JYAA-dah TEEK-ha nuh-HEE",contextual_note:"Cok aci sevmiyorsaniz."},grammar_note:"'Jyada' = too much / a lot. 'Nahi' = not. Essential phrase for sensitive stomachs!"},{id:"a2-r-007",order:7,punjabi:"Bill le aao",punjabi_pronunciation:"bil LAI-aa-o",german:{translation:"Bringen Sie die Rechnung",pronunciation_guide:"bil LAI-aa-o",contextual_note:"Zum Bezahlen."},turkish:{translation:"Hesabi getirin",pronunciation_guide:"bil LAI-aa-o",contextual_note:"Oedemek icin."},grammar_note:"'Bill' = English loanword. 'Hisaab' is the traditional word but 'bill' is now universal."},{id:"a2-r-008",order:8,punjabi:"Swad bahut vadia e",punjabi_pronunciation:"swaad buh-HUT vuh-DEE-aa eh",german:{translation:"Es hat sehr gut geschmeckt!",pronunciation_guide:"swaad buh-HUT vuh-DEE-aa eh",contextual_note:"Koch loben! Sehr geschätzt."},turkish:{translation:"Cok lezzetliydi!",pronunciation_guide:"swaad buh-HUT vuh-DEE-aa eh",contextual_note:"Asci oegmek! Cok degelidir."},grammar_note:"Always compliment the food! 'Swad' = taste. This phrase will make you very popular."},{id:"a2-r-009",order:9,punjabi:"Panjabi khana dikhayo",punjabi_pronunciation:"pun-JUH-bee KHAH-nah dik-KHAA-yo",german:{translation:"Zeigen Sie punjabische Kueche",pronunciation_guide:"pun-JUH-bee KHAH-nah dik-KHAA-yo",contextual_note:"Authentisches Essen probieren."},turkish:{translation:"Pencap mutfagi goesterin",pronunciation_guide:"pun-JUH-bee KHAH-nah dik-KHAA-yo",contextual_note:"Otantik yemek tatmak."},grammar_note:"'Dikhana' = to show. 'Dikhayo' = show me (formal imperative)."},{id:"a2-r-010",order:10,punjabi:"Roti taza e?",punjabi_pronunciation:"ro-TEE tuh-ZAA eh",german:{translation:"Ist das Brot frisch?",pronunciation_guide:"ro-TEE tuh-ZAA eh",contextual_note:"Frische ist wichtig!"},turkish:{translation:"Ekmek taze mi?",pronunciation_guide:"ro-TEE tuh-ZAA eh",contextual_note:"Tazelik onemli!"},grammar_note:"'Taza' = fresh. Fresh roti is crucial - stale roti is considered an insult to serve!"},{id:"a2-r-011",order:11,punjabi:"Lassi deni e",punjabi_pronunciation:"LUS-see day-NEE eh",german:{translation:"Ich moechte Lassi",pronunciation_guide:"LUS-see day-NEE eh",contextual_note:"Das beruehmte Joghurtgetraenk!"},turkish:{translation:"Lassi istiyorum",pronunciation_guide:"LUS-see day-NEE eh",contextual_note:"Mashur yogurt icecegi!"},grammar_note:"Lassi is THE Punjabi drink. Sweet or salted, it's the perfect complement to spicy food."},{id:"a2-r-012",order:12,punjabi:"Bas kar do",punjabi_pronunciation:"bus kar DOH",german:{translation:"Das reicht / Genug",pronunciation_guide:"bus kar DOH",contextual_note:"Genug Essen bestellt."},turkish:{translation:"Yeter / Bu kadar",pronunciation_guide:"bus kar DOH",contextual_note:"Yeterince siparis."},grammar_note:"'Bas' = enough/stop. 'Bas kar do' = enough, stop (adding food). Important in generous Punjab!"},{id:"a2-r-013",order:13,punjabi:"Doggy bag mil sakdi e?",punjabi_pronunciation:"DOH-gee bag mil SUK-dee eh",german:{translation:"Kann ich eine To-Go-Tuete bekommen?",pronunciation_guide:"DOH-gee bag mil SUK-dee eh",contextual_note:"Reste mitnehmen."},turkish:{translation:"Paket yapabilir misiniz?",pronunciation_guide:"DOH-gee bag mil SUK-dee eh",contextual_note:"Artiklari goetueruelmek."},grammar_note:"'Doggy bag' = English loanword. Taking leftovers is common and not considered rude."},{id:"a2-r-014",order:14,punjabi:"Khana vadia see",punjabi_pronunciation:"KHAH-nuh vuh-DEE-aa see",german:{translation:"Das Essen war ausgezeichnet",pronunciation_guide:"KHAH-nuh vuh-DEE-aa see",contextual_note:"Dank am Ende des Essens."},turkish:{translation:"Yemek harikaydi",pronunciation_guide:"KHAH-nuh vuh-DEE-aa see",contextual_note:"Yemek sonu tesekkuer."},grammar_note:"Past tense: 'si' (was, feminine - because 'khana' is treated as feminine in some dialects)."}]},Cy={id:"a2-weather",level:"A2",category:"weather",sub_category:"Weather Expressions",title:"Weather & Seasons",description:"Talk about weather and seasonal changes",icon:"CloudSun",total_phrases:12,xp_reward:75,phrases:[{id:"a2-w-001",order:1,punjabi:"Mausam kiven aa?",punjabi_pronunciation:"MOW-sum kee-VEN aa",german:{translation:"Wie ist das Wetter?",pronunciation_guide:"MOW-sum kee-VEN aa",contextual_note:"Standard-Wetterfrage."},turkish:{translation:"Hava nasıl?",pronunciation_guide:"MOW-sum kee-VEN aa",contextual_note:"Standart hava sorusu."},grammar_note:"'Mausam' = weather (from Persian). 'Kiven aa' = how is it. Like Turkish 'Hava nasıl?'"},{id:"a2-w-002",order:2,punjabi:"Garmi bahut e",punjabi_pronunciation:"GUR-mee buh-HUT eh",german:{translation:"Es ist sehr heiss",pronunciation_guide:"GUR-mee buh-HUT eh",contextual_note:"Punjab-Sommer: bis zu 50°C!"},turkish:{translation:"Cok sıcak",pronunciation_guide:"GUR-mee buh-HUT eh",contextual_note:"Pencap yazlari: 50°C'ye kadar!"},grammar_note:"'Garmi' = heat. Punjab summers are extremely hot! 'Garmi' is also used for 'enthusiasm'."},{id:"a2-w-003",order:3,punjabi:"Sardi lag rahi e",punjabi_pr
